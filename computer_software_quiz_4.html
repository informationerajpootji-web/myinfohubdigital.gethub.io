<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Software MCQ Quiz - Set 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans Devanagari','Poppins',sans-serif;
    background:linear-gradient(135deg,#0a1628,#0d2b1e,#1a0a28,#0a2020);
    background-size:400% 400%;
    animation:bgShift 12s ease infinite;
    min-height:100vh;color:#fff;padding:20px;
  }
  @keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .container{max-width:820px;margin:0 auto;}
  .header{
    text-align:center;padding:28px 20px 18px;
    background:rgba(255,255,255,0.05);border-radius:20px;
    margin-bottom:22px;border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
  }
  .header h1{
    font-size:1.75rem;font-weight:700;
    background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:5px;
  }
  .header p{color:#aaa;font-size:0.88rem;}
  .set-badge{
    display:inline-block;
    background:linear-gradient(90deg,#a78bfa33,#60a5fa33);
    border:1px solid #a78bfa55;color:#a78bfa;
    padding:4px 14px;border-radius:50px;
    font-size:0.78rem;font-weight:700;letter-spacing:1px;margin-bottom:8px;
  }
  .stats-bar{
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,0.06);border-radius:14px;
    padding:14px 20px;margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;gap:10px;
  }
  .stat-item{text-align:center;}
  .stat-label{font-size:0.7rem;color:#999;text-transform:uppercase;letter-spacing:1px;}
  .stat-value{font-size:1.35rem;font-weight:700;color:#a78bfa;}
  .progress-wrap{width:100%;background:rgba(255,255,255,0.1);border-radius:50px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-bar{height:100%;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);border-radius:50px;transition:width .5s ease;width:0%;}
  .question-card{
    background:rgba(255,255,255,0.05);border-radius:20px;padding:28px;
    border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);
    margin-bottom:20px;animation:fadeIn .35s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .question-number{font-size:0.78rem;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .question-text{font-size:1.08rem;font-weight:600;line-height:1.65;color:#f0f0f0;margin-bottom:22px;}
  .options-grid{display:flex;flex-direction:column;gap:11px;}
  .option-btn{
    display:flex;align-items:center;gap:13px;
    background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:13px 17px;cursor:pointer;
    transition:all .22s ease;text-align:left;color:#ddd;
    font-size:0.95rem;font-family:inherit;line-height:1.5;
  }
  .option-btn:hover:not(:disabled){background:rgba(167,139,250,.13);border-color:#a78bfa;transform:translateX(4px);}
  .option-badge{
    width:32px;height:32px;border-radius:50%;
    background:rgba(255,255,255,0.1);display:flex;align-items:center;
    justify-content:center;font-weight:700;font-size:0.83rem;flex-shrink:0;color:#a78bfa;
  }
  .option-btn.correct{background:rgba(52,211,153,.2)!important;border-color:#34d399!important;color:#fff!important;}
  .option-btn.correct .option-badge{background:#34d399!important;color:#0a1628!important;}
  .option-btn.wrong{background:rgba(248,113,113,.2)!important;border-color:#f87171!important;color:#fff!important;}
  .option-btn.wrong .option-badge{background:#f87171!important;color:#fff!important;}
  .option-btn:disabled{cursor:not-allowed;transform:none!important;}
  .explanation-box{
    display:none;margin-top:20px;
    background:rgba(167,139,250,.07);border-left:4px solid #a78bfa;
    border-radius:0 12px 12px 0;padding:16px 18px;animation:fadeIn .4s ease;
  }
  .explanation-box.show{display:block;}
  .exp-title{font-size:0.76rem;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
  .explanation-box p{color:#ccc;font-size:0.92rem;line-height:1.65;}
  .all-explanations{display:none;margin-top:14px;}
  .all-explanations.show{display:block;}
  .exp-option-row{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:0.87rem;color:#bbb;line-height:1.55;}
  .exp-option-row:last-child{border-bottom:none;}
  .exp-option-row strong{color:#a78bfa;}
  .next-btn{
    display:none;margin-top:20px;width:100%;padding:15px;
    background:linear-gradient(90deg,#a78bfa,#60a5fa);border:none;
    border-radius:12px;font-size:1rem;font-weight:700;color:#0a0a1e;
    cursor:pointer;transition:all .3s ease;font-family:inherit;letter-spacing:.5px;
  }
  .next-btn:hover{transform:scale(1.02);box-shadow:0 8px 25px rgba(167,139,250,.4);}
  .next-btn.show{display:block;}
  .result-screen{
    display:none;text-align:center;padding:40px 20px;
    background:rgba(255,255,255,0.05);border-radius:20px;
    border:1px solid rgba(255,255,255,0.1);
  }
  .result-screen.show{display:block;}
  .result-emoji{font-size:4rem;margin-bottom:14px;}
  .result-screen h2{
    font-size:1.9rem;font-weight:700;
    background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;
  }
  .big-score{font-size:3.4rem;font-weight:700;color:#a78bfa;margin:16px 0;}
  .percentage{font-size:1.2rem;color:#aaa;margin-bottom:22px;}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
  .result-stat{background:rgba(255,255,255,0.06);border-radius:12px;padding:16px;}
  .r-num{font-size:1.8rem;font-weight:700;}
  .r-label{font-size:0.73rem;color:#888;margin-top:4px;}
  .correct-stat .r-num{color:#34d399;}
  .wrong-stat .r-num{color:#f87171;}
  .total-stat .r-num{color:#60a5fa;}
  .grade-badge{display:inline-block;padding:6px 18px;border-radius:50px;font-weight:700;font-size:0.88rem;margin-bottom:10px;}
  .restart-btn{
    padding:14px 38px;background:linear-gradient(90deg,#a78bfa,#60a5fa);
    border:none;border-radius:12px;font-size:1rem;font-weight:700;
    color:#0a0a1e;cursor:pointer;transition:all .3s ease;font-family:inherit;
  }
  .restart-btn:hover{transform:scale(1.05);box-shadow:0 8px 28px rgba(167,139,250,.4);}
  @media(max-width:600px){.header h1{font-size:1.35rem;}.result-grid{grid-template-columns:1fr;}.big-score{font-size:2.4rem;}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="set-badge">SET 4 — 100 BRAND NEW MCQs</div>
    <h1>⚡ Computer Software Quiz</h1>
    <p>100 एकदम नए प्रश्न | हिंदी में | सभी विकल्पों की व्याख्या सहित</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><div class="stat-label">प्रश्न</div><div class="stat-value" id="qCounter">1 / 100</div></div>
    <div class="stat-item"><div class="stat-label">✅ सही</div><div class="stat-value" id="correctCount">0</div></div>
    <div class="stat-item"><div class="stat-label">❌ गलत</div><div class="stat-value" id="wrongCount">0</div></div>
    <div class="stat-item"><div class="stat-label">🏆 स्कोर</div><div class="stat-value" id="scorePercent">0%</div></div>
    <div class="progress-wrap" style="width:100%"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-number" id="qNum">प्रश्न 1</div>
    <div class="question-text" id="qText"></div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="explanation-box" id="explanationBox">
      <div class="exp-title">✅ सही उत्तर की व्याख्या</div>
      <p id="correctExp"></p>
      <div class="all-explanations" id="allExplanations"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">अगला सवाल →</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="grade-badge" id="gradeBadge"></div>
    <h2>Quiz पूरा हुआ!</h2>
    <div class="big-score" id="finalScore"></div>
    <div class="percentage" id="finalPercent"></div>
    <div class="result-grid">
      <div class="result-stat correct-stat"><div class="r-num" id="rCorrect">0</div><div class="r-label">✅ सही उत्तर</div></div>
      <div class="result-stat wrong-stat"><div class="r-num" id="rWrong">0</div><div class="r-label">❌ गलत उत्तर</div></div>
      <div class="result-stat total-stat"><div class="r-num">100</div><div class="r-label">📋 कुल प्रश्न</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 फिर से शुरू करें</button>
  </div>
</div>

<script>
const allQuestions = [

// ══════════════════════════════════════════════
// SECTION 1 : OS INTERNALS & SYSTEM PROGRAMMING (1-20)
// ══════════════════════════════════════════════
{
  q:"Segmentation Fault (Segfault) क्यों होती है?",
  options:["Internet connection टूटने पर","Program किसी ऐसी memory location को access करे जो उसे allowed नहीं","Hard disk full होने पर","Keyboard disconnect होने पर"],
  correct:1,
  explanations:[
    "Segfault internet से नहीं।",
    "✅ सही! Segmentation Fault तब होती है जब program ऐसी memory address access करता है जिसकी उसे permission नहीं — जैसे NULL pointer dereference, out-of-bounds array access।",
    "Disk full अलग error है।",
    "Keyboard disconnect अलग है।"
  ]
},
{
  q:"Stack Overflow Error किस कारण होती है?",
  options:["Too many files open","Infinite या too deep recursion से call stack भर जाए","RAM का ज्यादा use","Disk full होना"],
  correct:1,
  explanations:[
    "File limit अलग error है।",
    "✅ सही! Stack Overflow तब होती है जब function calls का stack बहुत deep हो जाए — infinite recursion इसका सबसे common cause है — call stack की fixed limit होती है।",
    "RAM अलग issue है।",
    "Disk full अलग है।"
  ]
},
{
  q:"Memory Leak क्या होती है?",
  options:["RAM से data leak होना","Allocated memory को free न करना — memory available कम होती जाती है","Password leak होना","Data corruption"],
  correct:1,
  explanations:[
    "RAM physically leak नहीं होती।",
    "✅ सही! Memory Leak तब होती है जब program memory allocate करता है लेकिन use के बाद free नहीं करता — time के साथ available memory कम होती जाती है, program slow/crash होता है।",
    "Password leak security issue है।",
    "Data corruption अलग है।"
  ]
},
{
  q:"Buffer Overflow Attack क्या है?",
  options:["Network buffer slow होना","Buffer की fixed size से ज्यादा data लिखकर adjacent memory overwrite करना — exploit हो सकता है","Video buffer होना","Audio buffer होना"],
  correct:1,
  explanations:[
    "Network buffering अलग है।",
    "✅ सही! Buffer Overflow में attacker buffer की capacity से ज्यादा data inject करता है — adjacent memory (return address) overwrite होती है — malicious code execute हो सकता है।",
    "Video buffering media का है।",
    "Audio buffering media का है।"
  ]
},
{
  q:"Multithreading के क्या फायदे हैं?",
  options:["केवल memory बढ़ती है","CPU utilization बढ़ती है, parallel tasks execute होते हैं, responsiveness बढ़ती है","Internet fast होता है","Disk space बढ़ती है"],
  correct:1,
  explanations:[
    "Multithreading memory से नहीं।",
    "✅ सही! Multithreading से: (1) CPU efficiently use होता है, (2) multiple tasks simultaneously run होते हैं, (3) UI responsive रहती है — background में काम होता है।",
    "Internet speed threading से नहीं।",
    "Disk space threading से नहीं।"
  ]
},
{
  q:"Mutex Lock लेने पर क्या होता है अगर दूसरा thread same lock लेना चाहे?",
  options:["दूसरा thread automatically access पा जाता है","दूसरा thread block/wait होता है जब तक first thread lock release न करे","System crash होता है","New lock बन जाता है"],
  correct:1,
  explanations:[
    "Mutex exclusive lock है — दो threads simultaneously नहीं।",
    "✅ सही! जब Thread A Mutex lock hold करे और Thread B same lock acquire करने की कोशिश करे, तो Thread B block हो जाता है और wait करता है जब तक Thread A lock release न करे।",
    "System crash नहीं होता।",
    "New lock नहीं बनता।"
  ]
},
{
  q:"Copy-on-Write (COW) technique क्या है?",
  options:["Files को copy करना","Resources को tab करने तक share करना, modify होने पर ही copy बनाना — memory efficient","Writing speed बढ़ाना","Copy protection"],
  correct:1,
  explanations:[
    "COW physical file copy नहीं।",
    "✅ सही! Copy-on-Write में parent और child process (fork) same memory pages share करते हैं — जब कोई भी page modify करे, तभी उस page की copy बनती है। Fork() में Linux यही करता है।",
    "Writing speed से नहीं।",
    "Copy protection DRM है।"
  ]
},
{
  q:"Demand Paging क्या है?",
  options:["Printing demand करना","Pages को जरूरत पड़ने पर ही disk से RAM में load करना — सब pages पहले से load नहीं","Page numbering","Pagination in UI"],
  correct:1,
  explanations:[
    "Demand Paging printing नहीं।",
    "✅ सही! Demand Paging lazy loading strategy है — process शुरू होने पर सभी pages RAM में नहीं आतीं, केवल जब किसी page की जरूरत हो (page fault पर) तब disk से load होती है।",
    "Page numbering documents में होता है।",
    "UI Pagination अलग concept है।"
  ]
},
{
  q:"Inter-Process Communication में Pipe का उपयोग कैसे होता है?",
  options:["Network pipes connect करना","एक process का output दूसरे process का input बनाना — Linux में | symbol","Water pipes","Hardware pipes"],
  correct:1,
  explanations:[
    "Network pipes अलग हैं।",
    "✅ सही! Unix/Linux में Pipe (|) एक process के stdout को दूसरे के stdin से connect करता है — जैसे: ls | grep txt — ls का output grep को जाता है।",
    "Water pipes physical हैं।",
    "Hardware pipes अलग concept है।"
  ]
},
{
  q:"Monolithic Kernel vs Microkernel में performance का अंतर क्या है?",
  options:["दोनों equal हैं","Monolithic faster है क्योंकि kernel services same address space में; Microkernel slower क्योंकि IPC overhead है","Microkernel faster है","Speed hardware पर depends"],
  correct:1,
  explanations:[
    "Performance difference है।",
    "✅ सही! Monolithic Kernel में सभी services (file system, drivers) kernel space में run होती हैं — fast। Microkernel में services user space में होती हैं — IPC (message passing) की वजह से overhead है।",
    "Microkernel IPC overhead की वजह से slower हो सकता है।",
    "Architecture का fundamental impact है।"
  ]
},
{
  q:"System Call की संख्या Linux में लगभग कितनी है?",
  options:["10","50","300+ से ज्यादा","1000+"],
  correct:2,
  explanations:[
    "10 बहुत कम है।",
    "50 भी कम है।",
    "✅ सही! Linux में 300+ system calls हैं — read(), write(), open(), close(), fork(), exec(), mmap() आदि। x86-64 Linux में approximately 300-400 system calls हैं।",
    "1000+ नहीं है।"
  ]
},
{
  q:"Process Orphan क्या होता है?",
  options:["Process जिसका कोई काम नहीं","जिस process का parent process पहले terminate हो जाए — child अकेली रह जाए","Deleted process","Paused process"],
  correct:1,
  explanations:[
    "Orphan काम से define नहीं।",
    "✅ सही! Orphan Process वह है जिसका Parent Process terminate हो गया हो। Linux में orphan process को 'init' process (PID 1) adopt कर लेती है।",
    "Deleted process terminated है।",
    "Paused process suspended है।"
  ]
},
{
  q:"Kernel Space और User Space में memory separation क्यों है?",
  options:["Memory save करने के लिए","Security और stability — user programs kernel memory corrupt न कर सकें","Speed बढ़ाने के लिए","Disk space बचाने के लिए"],
  correct:1,
  explanations:[
    "Memory separation से memory save नहीं होती।",
    "✅ सही! Separation ensures करती है कि malicious या buggy user programs kernel memory access न करें — system stability और security maintained रहती है।",
    "Speed separation का goal नहीं।",
    "Disk space से नहीं।"
  ]
},
{
  q:"Spin Lock क्या है?",
  options:["Lock जो spin करता हो","Thread जो lock available होने तक CPU time waste करते हुए continuously check करे (busy waiting)","Database lock","File lock"],
  correct:1,
  explanations:[
    "Physical spin नहीं।",
    "✅ सही! Spin Lock में thread lock acquire होने तक loop में continuously check करता रहता है (busy waiting) — short wait के लिए efficient, long wait के लिए CPU wasteful।",
    "Database lock अलग है।",
    "File lock अलग है।"
  ]
},
{
  q:"Inode क्या है Linux में?",
  options:["Input Node","File का metadata store करने वाला data structure — permissions, size, timestamps, disk location","Internet Node","Index Node जो files का नाम store करे"],
  correct:1,
  explanations:[
    "Inode input से नहीं।",
    "✅ सही! Inode (Index Node) Linux file system में file का metadata store करता है — size, owner, permissions, timestamps, disk block locations — filename inode में नहीं होता।",
    "Internet से नहीं।",
    "Filename directory में होता है, inode में नहीं।"
  ]
},
{
  q:"ELF format क्या है Linux में?",
  options:["Elf programming language","Executable and Linkable Format — Linux executables, object files और shared libraries का format","Error Log File","Embedded Linux Format"],
  correct:1,
  explanations:[
    "ELF programming language नहीं।",
    "✅ सही! ELF (Executable and Linkable Format) Linux/Unix का standard binary format है — compiled programs (.out), shared libraries (.so), object files (.o) सब ELF format में होते हैं।",
    "Error Log Format अलग है।",
    "Embedded Linux Format नहीं।"
  ]
},
{
  q:"Shared Library (.so file) का क्या फायदा है?",
  options:["Larger executable size","Multiple programs एक ही library code को memory में share करें — disk और memory efficient","Slower execution","More dependencies"],
  correct:1,
  explanations:[
    "Shared library executable size कम करती है।",
    "✅ सही! Shared Library (.so Linux, .dll Windows) को multiple programs runtime पर share करते हैं — disk पर एक copy, memory में एक copy। Static library हर executable में embedded होती है।",
    "Shared library execution faster होती है।",
    "Shared library dependencies manage करती है।"
  ]
},
{
  q:"Fork() System Call क्या करता है?",
  options:["File fork करना","Current process की exact copy (child process) बनाना","Fork join operation","Keyboard shortcut"],
  correct:1,
  explanations:[
    "File fork अलग है।",
    "✅ सही! fork() system call current process (parent) की exact duplicate (child process) बनाता है — child को नया PID मिलता है, बाकी सब copy होता है। Child में fork() 0 return करता है।",
    "Fork-Join parallel programming pattern है।",
    "Keyboard shortcut से अलग है।"
  ]
},

// ═══════════ QUIZ ENGINE ═══════════
let questions=[],currentIndex=0,score=0,wrongAnswers=0,answered=false;

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function prepareQuestions(){
  questions=shuffle(allQuestions).map(q=>{
    const idx=shuffle([0,1,2,3]);
    return{q:q.q,options:idx.map(i=>q.options[i]),correct:idx.indexOf(q.correct),explanations:idx.map(i=>q.explanations[i])};
  });
}

function loadQuestion(){
  answered=false;
  const q=questions[currentIndex];
  document.getElementById('qNum').textContent=`प्रश्न ${currentIndex+1}`;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('qCounter').textContent=`${currentIndex+1} / 100`;
  document.getElementById('progressBar').style.width=`${(currentIndex/100)*100}%`;
  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((lbl,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-badge">${lbl}</span><span>${q.options[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  document.getElementById('explanationBox').classList.remove('show');
  document.getElementById('allExplanations').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(sel){
  if(answered)return;
  answered=true;
  const q=questions[currentIndex];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  if(sel===q.correct){btns[sel].classList.add('correct');score++;document.getElementById('correctCount').textContent=score;}
  else{btns[sel].classList.add('wrong');btns[q.correct].classList.add('correct');wrongAnswers++;document.getElementById('wrongCount').textContent=wrongAnswers;}
  document.getElementById('scorePercent').textContent=Math.round((score/(currentIndex+1))*100)+'%';
  document.getElementById('correctExp').textContent=q.explanations[q.correct];
  const ae=document.getElementById('allExplanations');
  ae.innerHTML='<div style="font-size:.76rem;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">सभी विकल्पों की व्याख्या:</div>';
  ['A','B','C','D'].forEach((lbl,i)=>{
    const d=document.createElement('div');d.className='exp-option-row';
    d.innerHTML=`<strong>${lbl})</strong> ${q.options[i]}: ${q.explanations[i]}`;ae.appendChild(d);
  });
  document.getElementById('explanationBox').classList.add('show');
  document.getElementById('allExplanations').classList.add('show');
  const nb=document.getElementById('nextBtn');
  nb.textContent=currentIndex===99?'परिणाम देखें 🏆':'अगला सवाल →';
  nb.classList.add('show');
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex>=100){showResult();return;}
  loadQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showResult(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('statsBar').style.display='none';
  document.getElementById('resultScreen').classList.add('show');
  const pct=Math.round((score/100)*100);
  document.getElementById('finalScore').textContent=`${score} / 100`;
  document.getElementById('finalPercent').textContent=`सफलता प्रतिशत: ${pct}%`;
  document.getElementById('rCorrect').textContent=score;
  document.getElementById('rWrong').textContent=wrongAnswers;
  let emoji,grade,color;
  if(pct>=90){emoji='🏆';grade='Outstanding! लाजवाब';color='#fbbf24';}
  else if(pct>=75){emoji='🌟';grade='Excellent! उत्कृष्ट';color='#34d399';}
  else if(pct>=60){emoji='👏';grade='Good! शाबाश';color='#60a5fa';}
  else if(pct>=40){emoji='📚';grade='Average — अभ्यास जारी रखें';color='#a78bfa';}
  else{emoji='💪';grade='Keep Going! हार मत मानो';color='#f87171';}
  document.getElementById('resultEmoji').textContent=emoji;
  const b=document.getElementById('gradeBadge');
  b.textContent=grade;
  b.style.cssText=`background:${color}22;color:${color};border:1px solid ${color}55;`;
}

function restartQuiz(){
  score=0;wrongAnswers=0;currentIndex=0;
  ['correctCount','wrongCount'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('scorePercent').textContent='0%';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display='block';
  document.getElementById('statsBar').style.display='flex';
  prepareQuestions();loadQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

prepareQuestions();
loadQuestion();
