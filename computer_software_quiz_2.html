<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Software MCQ Quiz - Set 2 (100 New Questions)</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans Devanagari', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1a0533, #0d2137, #0a3d2e);

    color: #fff;
    padding: 20px;
  }
  .container { max-width: 820px; margin: 0 auto; }
  .header {
    text-align: center;
    padding: 28px 20px 18px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    margin-bottom: 22px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    background: linear-gradient(90deg, #43e97b, #38f9d7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
  }
  .header p { color: #aaa; font-size: 0.88rem; }
  .set-badge {
    display: inline-block;
    background: linear-gradient(90deg, #43e97b33, #38f9d733);
    border: 1px solid #43e97b55;
    color: #43e97b;
    padding: 4px 14px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    flex-wrap: wrap;
    gap: 10px;
  }
  .stat-item { text-align: center; }
  .stat-label { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.35rem; font-weight: 700; color: #43e97b; }
  .progress-wrap {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 10px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #43e97b, #38f9d7);
    border-radius: 50px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .question-card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
    animation: fadeIn 0.35s ease;
  }

  .question-number { font-size: 0.78rem; color: #43e97b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .question-text { font-size: 1.08rem; font-weight: 600; line-height: 1.65; color: #f0f0f0; margin-bottom: 22px; }
  .options-grid { display: flex; flex-direction: column; gap: 11px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 13px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 13px 17px;
    cursor: pointer;
    transition: all 0.22s ease;
    text-align: left;
    color: #ddd;
    font-size: 0.95rem;
    font-family: inherit;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(67,233,123,0.12);
    border-color: #43e97b;
    transform: translateX(4px);
  }
  .option-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.83rem;
    flex-shrink: 0; color: #43e97b;
  }
  .option-btn.correct { background: rgba(0,210,100,0.2) !important; border-color: #00d264 !important; color: #fff !important; }
  .option-btn.correct .option-badge { background: #00d264 !important; color: #fff !important; }
  .option-btn.wrong { background: rgba(255,55,55,0.2) !important; border-color: #ff3737 !important; color: #fff !important; }
  .option-btn.wrong .option-badge { background: #ff3737 !important; color: #fff !important; }
  .option-btn:disabled { cursor: not-allowed; transform: none !important; }
  .explanation-box {
    display: none;
    margin-top: 20px;
    background: rgba(67,233,123,0.06);
    border-left: 4px solid #43e97b;
    border-radius: 0 12px 12px 0;
    padding: 16px 18px;
    animation: fadeIn 0.4s ease;
  }
  .explanation-box.show { display: block; }
  .exp-title { font-size: 0.76rem; color: #43e97b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
  .explanation-box p { color: #ccc; font-size: 0.92rem; line-height: 1.65; }
  .all-explanations { display: none; margin-top: 14px; }
  .all-explanations.show { display: block; }
  .exp-option-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 0.87rem; color: #bbb; line-height: 1.55; }
  .exp-option-row:last-child { border-bottom: none; }
  .exp-option-row strong { color: #43e97b; }
  .next-btn {
    display: none;
    margin-top: 20px; width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, #43e97b, #38f9d7);
    border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 700;
    color: #0a2010; cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 0.5px;
  }
  .next-btn:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(67,233,123,0.4); }
  .next-btn.show { display: block; }
  .result-screen {
    display: none;
    text-align: center; padding: 40px 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 4rem; margin-bottom: 14px; }
  .result-screen h2 {
    font-size: 1.9rem; font-weight: 700;
    background: linear-gradient(90deg, #43e97b, #38f9d7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .big-score { font-size: 3.4rem; font-weight: 700; color: #43e97b; margin: 16px 0; }
  .percentage { font-size: 1.2rem; color: #aaa; margin-bottom: 22px; }
  .result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 26px; }
  .result-stat { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; }
  .result-stat .r-num { font-size: 1.8rem; font-weight: 700; }
  .result-stat .r-label { font-size: 0.73rem; color: #888; margin-top: 4px; }
  .correct-stat .r-num { color: #43e97b; }
  .wrong-stat .r-num { color: #ff5555; }
  .total-stat .r-num { color: #38f9d7; }
  .grade-badge {
    display: inline-block; padding: 6px 18px;
    border-radius: 50px; font-weight: 700; font-size: 0.88rem; margin-bottom: 10px;
  }
  .restart-btn {
    padding: 14px 38px;
    background: linear-gradient(90deg, #43e97b, #38f9d7);
    border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 700; color: #0a2010;
    cursor: pointer; transition: all 0.3s ease; font-family: inherit;
  }
  .restart-btn:hover { transform: scale(1.05); box-shadow: 0 8px 28px rgba(67,233,123,0.4); }
  @media(max-width:600px) { .header h1{font-size:1.35rem;} .result-grid{grid-template-columns:1fr;} .big-score{font-size:2.4rem;} }
</style>
</head>
<body>
<div class="container">

  <div class="header">

  <div class="result-screen" id="resultScreen">

      <div class="result-stat correct-stat"><div class="r-num" id="rCorrect">0</div><div class="r-label">✅ सही उत्तर</div></div>
      <div class="result-stat wrong-stat"><div class="r-num" id="rWrong">0</div><div class="r-label">❌ गलत उत्तर</div></div>
      <div class="result-stat total-stat"><div class="r-num">100</div><div class="r-label">📋 कुल प्रश्न</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 फिर से शुरू करें</button>
  </div>

</div>

// ===== QUIZ ENGINE =====
let questions = [];
let currentIndex = 0;
let score = 0;
let wrongAnswers = 0;
let answered = false;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  questions = shuffle(allQuestions).map(q => {
    const idx = shuffle([0,1,2,3]);
    const newOptions = idx.map(i => q.options[i]);
    const newExps = idx.map(i => q.explanations[i]);
    const newCorrect = idx.indexOf(q.correct);
    return { q: q.q, options: newOptions, correct: newCorrect, explanations: newExps };
  });
}

function loadQuestion() {
  answered = false;
  const q = questions[currentIndex];
  document.getElementById('qNum').textContent = `प्रश्न ${currentIndex + 1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounter').textContent = `${currentIndex + 1} / 100`;
  document.getElementById('progressBar').style.width = `${(currentIndex / 100) * 100}%`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-badge">${lbl}</span><span>${q.options[i]}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('explanationBox').classList.remove('show');
  document.getElementById('allExplanations').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(selectedIndex) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  if (selectedIndex === q.correct) {
    buttons[selectedIndex].classList.add('correct');
    score++;
    document.getElementById('correctCount').textContent = score;
  } else {
    buttons[selectedIndex].classList.add('wrong');
    buttons[q.correct].classList.add('correct');
    wrongAnswers++;
    document.getElementById('wrongCount').textContent = wrongAnswers;
  }

  const total = currentIndex + 1;
  document.getElementById('scorePercent').textContent = Math.round((score / total) * 100) + '%';

  document.getElementById('correctExp').textContent = q.explanations[q.correct];
  const allExp = document.getElementById('allExplanations');
  allExp.innerHTML = '<div style="font-size:0.76rem;color:#43e97b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">सभी विकल्पों की व्याख्या:</div>';
  ['A','B','C','D'].forEach((lbl, i) => {
    const div = document.createElement('div');
    div.className = 'exp-option-row';
    div.innerHTML = `<strong>${lbl})</strong> ${q.options[i]}: ${q.explanations[i]}`;
    allExp.appendChild(div);
  });

  document.getElementById('explanationBox').classList.add('show');
  document.getElementById('allExplanations').classList.add('show');
  const nb = document.getElementById('nextBtn');
  nb.textContent = currentIndex === 99 ? 'परिणाम देखें 🏆' : 'अगला सवाल →';
  nb.classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= 100) { showResult(); return; }
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');
  const pct = Math.round((score / 100) * 100);
  document.getElementById('finalScore').textContent = `${score} / 100`;
  document.getElementById('finalPercent').textContent = `सफलता प्रतिशत: ${pct}%`;
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = wrongAnswers;
  let emoji, grade, color;
  if (pct >= 90) { emoji='🏆'; grade='Outstanding! अद्भुत प्रदर्शन'; color='#43e97b'; }
  else if (pct >= 75) { emoji='🌟'; grade='Excellent! उत्कृष्ट'; color='#38f9d7'; }
  else if (pct >= 60) { emoji='👏'; grade='Good! अच्छा प्रदर्शन'; color='#4fc3f7'; }
  else if (pct >= 40) { emoji='📚'; grade='Average — और अभ्यास करें'; color='#ffd200'; }
  else { emoji='💪'; grade='Keep Trying! हिम्मत रखो'; color='#ff6b6b'; }
  document.getElementById('resultEmoji').textContent = emoji;
  const badge = document.getElementById('gradeBadge');
  badge.textContent = grade;
  badge.style.cssText = `background:${color}22; color:${color}; border:1px solid ${color}55;`;
}

function restartQuiz() {
  score = 0; wrongAnswers = 0; currentIndex = 0;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('scorePercent').textContent = '0%';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('statsBar').style.display = 'flex';
  prepareQuestions();
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

prepareQuestions();
loadQuestion();
