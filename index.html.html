<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Office MCQ - MP ITI Training Officer</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1b2d;
    --card: #162236;
    --accent: #f7971e;
    --accent2: #ffd200;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #38bdf8;
    --text: #e8f0fe;
    --muted: #8ca0bc;
    --border: #1e3a5f;
    --option-bg: #1a2e47;
    --option-hover: #1e3a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans Devanagari', 'Baloo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a3a6e 0%, #0f1b2d 60%, #1a2e47 100%);
    border-bottom: 3px solid var(--accent);
    padding: 22px 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(247,151,30,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #0f1b2d;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 3px 14px;
    border-radius: 20px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 14px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
  }
  .stat-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
  }
  .stat-dot.total { background: var(--blue); }
  .stat-dot.correct { background: var(--green); }
  .stat-dot.wrong { background: var(--red); }
  .stat-dot.pending { background: var(--muted); }
  #score-display {
    font-family: 'Baloo 2', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--accent2);
    margin-left: 10px;
  }

  /* PROGRESS */
  .progress-wrap {
    height: 4px;
    background: var(--border);
  }
  .progress-fill {
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
    width: 0%;
  }

  /* MAIN */
  .main { max-width: 820px; margin: 0 auto; padding: 24px 16px 60px; }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 28px;
    overflow: hidden;
    transition: box-shadow 0.3s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-card:hover { box-shadow: 0 4px 28px rgba(247,151,30,0.08); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    min-width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0f1b2d;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 14px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }

  /* OPTIONS */
  .options { padding: 14px 20px 10px; display: flex; flex-direction: column; gap: 9px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 15px;
    background: var(--option-bg);
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    width: 100%;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--option-hover);
    border-color: var(--accent);
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }
  .option-label {
    min-width: 26px; height: 26px;
    border-radius: 7px;
    background: rgba(255,255,255,0.08);
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.2s;
  }

  /* Correct / Wrong */
  .option-btn.correct {
    background: rgba(34,197,94,0.12);
    border-color: var(--green);
  }
  .option-btn.correct .option-label { background: var(--green); color: #fff; }
  .option-btn.wrong {
    background: rgba(239,68,68,0.12);
    border-color: var(--red);
  }
  .option-btn.wrong .option-label { background: var(--red); color: #fff; }
  .option-btn.highlight-correct {
    background: rgba(34,197,94,0.07);
    border-color: rgba(34,197,94,0.4);
  }

  /* EXPLANATION */
  .explanation {
    margin: 0 20px 16px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .explanation.show { display: flex; }
  .expl-item {
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 13px;
    line-height: 1.6;
    border-left: 3px solid;
  }
  .expl-item.correct-expl { border-color: var(--green); background: rgba(34,197,94,0.07); }
  .expl-item.wrong-expl   { border-color: var(--red);   background: rgba(239,68,68,0.07); }
  .expl-item.neutral-expl { border-color: var(--blue);  background: rgba(56,189,248,0.07); }
  .expl-label {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .correct-expl .expl-label { color: var(--green); }
  .wrong-expl   .expl-label { color: var(--red); }
  .neutral-expl .expl-label { color: var(--blue); }

  /* RESULT BANNER */
  #result-banner {
    display: none;
    background: linear-gradient(135deg, #1a3a6e, #0f1b2d);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 36px 24px;
    text-align: center;
    margin-top: 30px;
  }
  #result-banner h2 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent2);
  }
  #result-banner .score-big {
    font-family: 'Baloo 2', sans-serif;
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
  }
  #result-banner p { color: var(--muted); font-size: 15px; }
  .restart-btn {
    margin-top: 20px;
    padding: 12px 32px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #0f1b2d;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .restart-btn:hover { transform: scale(1.04); box-shadow: 0 4px 20px rgba(247,151,30,0.4); }

  @media (max-width: 500px) {
    .q-text { font-size: 13.5px; }
    .option-btn { font-size: 13px; padding: 10px 12px; }
    .expl-item { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">MP ITI Training Officer Exam</div>
  <h1>Microsoft Office <span>MCQ Quiz</span></h1>
  <p>100 प्रश्न | सही = हरा ✅ | गलत = लाल ❌ | सभी विकल्पों की व्याख्या</p>
</div>

<div class="stats-bar">
  <div class="stat-item"><span class="stat-dot total"></span> कुल: <strong>100</strong></div>
  <div class="stat-item"><span class="stat-dot correct"></span> सही: <strong id="correct-count">0</strong></div>
  <div class="stat-item"><span class="stat-dot wrong"></span> गलत: <strong id="wrong-count">0</strong></div>
  <div class="stat-item"><span class="stat-dot pending"></span> शेष: <strong id="pending-count">100</strong></div>
  <div id="score-display">Score: 0%</div>
</div>
<div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>

<div class="main" id="quiz-container"></div>

<script>
const questions = [
  {
    q: "MS Word में 'Mail Merge' का उपयोग किसलिए होता है?",
    opts: [
      "एक ही document को कई लोगों को अलग-अलग नाम/पते के साथ भेजने के लिए",
      "Email भेजने के लिए",
      "Document को Print करने के लिए",
      "File को Save करने के लिए"
    ],
    ans: 0,
    expls: [
      "✅ सही! Mail Merge से एक template document में database (जैसे Excel) से अलग-अलग नाम, पते जोड़कर बड़े पैमाने पर personalized letters बनाए जाते हैं।",
      "❌ Email भेजने का काम Outlook करता है, Mail Merge का primary उद्देश्य अलग है।",
      "❌ Print करना अलग function है (Ctrl+P), Mail Merge से print भी हो सकती है पर यह उसका मूल उद्देश्य नहीं।",
      "❌ File Save करना Ctrl+S से होता है, Mail Merge से नहीं।"
    ]
  },
  {
    q: "MS Excel में VLOOKUP function का पूरा नाम क्या है?",
    opts: [
      "Vertical Lookup",
      "Value Lookup",
      "Variable Lookup",
      "Virtual Lookup"
    ],
    ans: 0,
    expls: [
      "✅ सही! VLOOKUP = Vertical Lookup। यह किसी column में ऊपर से नीचे (vertically) मान खोजता है।",
      "❌ 'Value Lookup' गलत है — VLOOKUP का 'V' Vertical के लिए है।",
      "❌ 'Variable Lookup' भी गलत है — यह Excel का कोई term नहीं।",
      "❌ 'Virtual Lookup' गलत है — Excel में ऐसा कोई concept नहीं।"
    ]
  },
  {
    q: "PowerPoint में Slide Transition और Animation में क्या अंतर है?",
    opts: [
      "Transition slides के बीच effect है, Animation objects पर effect है",
      "दोनों एक ही हैं",
      "Animation slides के बीच है, Transition objects पर है",
      "Transition केवल text पर लागू होती है"
    ],
    ans: 0,
    expls: [
      "✅ सही! Transition = एक slide से दूसरी slide पर जाने का effect। Animation = slide के अंदर text/image आदि objects पर लागू effect।",
      "❌ दोनों बिल्कुल अलग हैं — Transition slide-level और Animation object-level होती है।",
      "❌ यह उल्टा है — Animation objects पर और Transition slides के बीच होती है।",
      "❌ Transition केवल text पर नहीं, पूरी slide पर लागू होती है।"
    ]
  },
  {
    q: "MS Word में 'Track Changes' feature का उपयोग क्यों किया जाता है?",
    opts: [
      "Document में किए गए सभी बदलावों को record करने के लिए",
      "Document को auto-save करने के लिए",
      "Spelling check करने के लिए",
      "Page number जोड़ने के लिए"
    ],
    ans: 0,
    expls: [
      "✅ सही! Track Changes से document में सभी additions, deletions और formatting changes record होते हैं — टीम editing में बहुत उपयोगी।",
      "❌ Auto-save एक अलग feature है जो AutoRecover settings में होता है।",
      "❌ Spelling check F7 key या Review tab में Spelling & Grammar से होती है।",
      "❌ Page number Insert tab > Page Number से जोड़ा जाता है।"
    ]
  },
  {
    q: "Excel में absolute cell reference कैसे लिखा जाता है?",
    opts: [
      "$A$1",
      "A1",
      "#A#1",
      "@A@1"
    ],
    ans: 0,
    expls: [
      "✅ सही! $A$1 absolute reference है — formula copy करने पर यह reference नहीं बदलती। $ sign column और row दोनों को lock करता है।",
      "❌ A1 relative reference है जो formula copy होने पर automatically adjust हो जाती है।",
      "❌ # Excel में cell reference के लिए use नहीं होता।",
      "❌ @ Excel cell reference में use नहीं होता।"
    ]
  },
  {
    q: "MS Word में shortcut key Ctrl+Z का क्या कार्य है?",
    opts: [
      "Undo — पिछला action वापस लाना",
      "Redo — आगे का action करना",
      "File को बंद करना",
      "Text को Bold करना"
    ],
    ans: 0,
    expls: [
      "✅ सही! Ctrl+Z = Undo। यह पिछली की गई क्रिया को वापस कर देता है।",
      "❌ Redo के लिए Ctrl+Y shortcut है।",
      "❌ File बंद करने के लिए Ctrl+W या Alt+F4 है।",
      "❌ Bold करने के लिए Ctrl+B shortcut है।"
    ]
  },
  {
    q: "PowerPoint में 'Slide Master' का उपयोग किसलिए होता है?",
    opts: [
      "सभी slides पर एक जैसा design/layout apply करने के लिए",
      "Slide को delete करने के लिए",
      "Presentation को PDF में save करने के लिए",
      "Slide show शुरू करने के लिए"
    ],
    ans: 0,
    expls: [
      "✅ सही! Slide Master से पूरी presentation का uniform theme, font, background और layout एक बार में set किया जाता है।",
      "❌ Slide delete करने के लिए right-click > Delete Slide या Delete key use होती है।",
      "❌ PDF save करने के लिए File > Save As > PDF format चुनते हैं।",
      "❌ Slide show शुरू करने के लिए F5 key या Slide Show tab use होती है।"
    ]
  },
  {
    q: "Excel में IF function का syntax क्या है?",
    opts: [
      "=IF(condition, value_if_true, value_if_false)",
      "=IF(value_if_true, condition, value_if_false)",
      "=IF(value_if_false, value_if_true, condition)",
      "=IF(condition, value_if_false, value_if_true)"
    ],
    ans: 0,
    expls: [
      "✅ सही! IF function: पहले condition, फिर सच होने पर value, फिर झूठ होने पर value। जैसे: =IF(A1>10, \"Pass\", \"Fail\")",
      "❌ IF में पहला argument हमेशा condition होता है, value_if_true नहीं।",
      "❌ यह क्रम गलत है — condition हमेशा पहले आती है।",
      "❌ value_if_true और value_if_false की position उल्टी है इस option में।"
    ]
  },
  {
    q: "MS Word में 'Styles' का उपयोग क्यों किया जाता है?",
    opts: [
      "Text formatting को consistent और quick बनाने के लिए",
      "Image insert करने के लिए",
      "Table बनाने के लिए",
      "Grammar check करने के लिए"
    ],
    ans: 0,
    expls: [
      "✅ सही! Styles से predefined formatting (font, size, color) एक click में apply होती है और पूरे document में consistency रहती है।",
      "❌ Image insert करने के लिए Insert tab > Pictures use होता है।",
      "❌ Table के लिए Insert > Table option है।",
      "❌ Grammar check के लिए Review > Spelling & Grammar है।"
    ]
  },
  {
    q: "Excel में COUNTIF function क्या करता है?",
    opts: [
      "किसी condition को पूरा करने वाले cells की गिनती करता है",
      "सभी numbers को जोड़ता है",
      "Average निकालता है",
      "Maximum value ढूंढता है"
    ],
    ans: 0,
    expls: [
      "✅ सही! COUNTIF = condition वाली counting। जैसे =COUNTIF(A1:A10, \">50\") से 50 से बड़े numbers की count मिलती है।",
      "❌ सभी numbers जोड़ने के लिए SUM function है।",
      "❌ Average के लिए AVERAGE function है।",
      "❌ Maximum value के लिए MAX function है।"
    ]
  },
  {
    q: "MS Word में 'Header and Footer' कहाँ दिखती है?",
    opts: [
      "Page के ऊपर (Header) और नीचे (Footer) के हिस्से में",
      "Document के बीच में",
      "Side margin में",
      "Title bar में"
    ],
    ans: 0,
    expls: [
      "✅ सही! Header = page का top area, Footer = page का bottom area। इनमें page number, date, company name आदि रखते हैं।",
      "❌ Document का बीच का भाग main content area होता है।",
      "❌ Side margin में text नहीं, बल्कि खाली जगह होती है (जब तक watermark न हो)।",
      "❌ Title bar window के सबसे ऊपर होती है जिसमें document का नाम दिखता है।"
    ]
  },
  {
    q: "Excel में किस shortcut से नई worksheet जोड़ते हैं?",
    opts: [
      "Shift+F11",
      "Ctrl+N",
      "Alt+W",
      "Ctrl+F11"
    ],
    ans: 0,
    expls: [
      "✅ सही! Shift+F11 से Excel में एक नई worksheet (sheet tab) तुरंत add हो जाती है।",
      "❌ Ctrl+N से एक नई Excel Workbook (नई file) खुलती है, worksheet नहीं।",
      "❌ Alt+W Excel में View menu खोलता है।",
      "❌ Ctrl+F11 कोई standard Excel shortcut नहीं है।"
    ]
  },
  {
    q: "PowerPoint में Slide Show के दौरान 'B' key दबाने से क्या होता है?",
    opts: [
      "Screen black हो जाती है (presentation pause)",
      "Slide back जाती है",
      "Bold text बनता है",
      "Slide बंद हो जाती है"
    ],
    ans: 0,
    expls: [
      "✅ सही! Slide Show के दौरान 'B' दबाने से screen black हो जाती है — audience का ध्यान खींचने के लिए उपयोगी। दोबारा 'B' दबाने पर वापस आती है।",
      "❌ Slide back जाने के लिए Left Arrow, Backspace या Page Up use करते हैं।",
      "❌ Bold formatting Slide Show mode में नहीं होती — यह editing mode में Ctrl+B से होती है।",
      "❌ Slide बंद करने के लिए Esc key use होती है।"
    ]
  },
  {
    q: "MS Word में 'Watermark' का उपयोग किस लिए होता है?",

let correctCount = 0;
let wrongCount = 0;
let answered = 0;

function updateStats() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('pending-count').textContent = 100 - answered;
  const pct = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;
  document.getElementById('score-display').textContent = `Score: ${pct}%`;
  document.getElementById('progress-fill').style.width = `${answered}%`;
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${qi}`;

    const header = document.createElement('div');
    header.className = 'q-header';
    header.innerHTML = `<div class="q-num">${qi+1}</div><div class="q-text">${q.q}</div>`;
    card.appendChild(header);

    const opts = document.createElement('div');
    opts.className = 'options';

    const labels = ['A', 'B', 'C', 'D'];
    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-label">${labels[oi]}</span><span>${opt}</span>`;
      btn.addEventListener('click', () => handleAnswer(qi, oi, btn, opts, expl));
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const expl = document.createElement('div');
    expl.className = 'explanation';
    q.expls.forEach((e, ei) => {
      const isCorrect = ei === q.ans;
      const div = document.createElement('div');
      div.className = `expl-item ${isCorrect ? 'correct-expl' : 'wrong-expl'}`;
      div.innerHTML = `<div class="expl-label">${labels[ei]}: ${isCorrect ? '✅ सही उत्तर' : '❌ गलत'}</div>${e}`;
      expl.appendChild(div);
    });
    card.appendChild(expl);

    container.appendChild(card);
  });
}

function handleAnswer(qi, selectedIdx, clickedBtn, optsDiv, explDiv) {
  const q = questions[qi];
  const allBtns = optsDiv.querySelectorAll('.option-btn');

  allBtns.forEach(b => b.disabled = true);

  if (selectedIdx === q.ans) {
    clickedBtn.classList.add('correct');
    correctCount++;
  } else {
    clickedBtn.classList.add('wrong');
    allBtns[q.ans].classList.add('highlight-correct');
    wrongCount++;
  }

  answered++;
  updateStats();
  explDiv.classList.add('show');

  if (answered === 100) {
    setTimeout(() => showResult(), 600);
  }
}

function showResult() {
  const pct = Math.round((correctCount / 100) * 100);
  let grade = pct >= 90 ? '🏆 Excellent!' : pct >= 75 ? '🥈 Very Good!' : pct >= 60 ? '🥉 Good!' : '📚 More Practice Needed';
  const banner = document.getElementById('result-banner');
  banner.style.display = 'block';
  banner.innerHTML = `
    <h2>Quiz Complete! ${grade}</h2>
    <div class="score-big">${pct}%</div>
    <p>✅ सही: ${correctCount} | ❌ गलत: ${wrongCount} | कुल: 100</p>
    <p style="margin-top:10px; color:#8ca0bc;">MP ITI Training Officer Microsoft Office परीक्षा</p>
    <button class="restart-btn" onclick="location.reload()">🔄 फिर से शुरू करें</button>
  `;
  banner.scrollIntoView({ behavior: 'smooth' });
}

buildQuiz();
updateStats();
