<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Software MCQ Quiz - Set 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans Devanagari','Poppins',sans-serif;
    background:linear-gradient(135deg,#1a0a2e,#16213e,#0f3460);
    min-height:100vh;color:#fff;padding:20px;
  }
  .container{max-width:820px;margin:0 auto;}
  .header{
    text-align:center;padding:28px 20px 18px;
    background:rgba(255,255,255,0.05);border-radius:20px;
    margin-bottom:22px;border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
  }
  .header h1{
    font-size:1.75rem;font-weight:700;
    background:linear-gradient(90deg,#e96c43,#f9a338,#ffd200);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:5px;
  }
  .header p{color:#aaa;font-size:0.88rem;}
  .set-badge{
    display:inline-block;
    background:linear-gradient(90deg,#e96c4333,#ffd20033);
    border:1px solid #e96c4355;color:#f9a338;
    padding:4px 14px;border-radius:50px;
    font-size:0.78rem;font-weight:700;letter-spacing:1px;margin-bottom:8px;
  }
  .stats-bar{
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,0.06);border-radius:14px;
    padding:14px 20px;margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;gap:10px;
  }
  .stat-item{text-align:center;}
  .stat-label{font-size:0.7rem;color:#999;text-transform:uppercase;letter-spacing:1px;}
  .stat-value{font-size:1.35rem;font-weight:700;color:#f9a338;}
  .progress-wrap{width:100%;background:rgba(255,255,255,0.1);border-radius:50px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-bar{height:100%;background:linear-gradient(90deg,#e96c43,#ffd200);border-radius:50px;transition:width .5s ease;width:0%;}
  .question-card{
    background:rgba(255,255,255,0.05);border-radius:20px;padding:28px;
    border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);
    margin-bottom:20px;animation:fadeIn .35s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .question-number{font-size:0.78rem;color:#f9a338;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .question-text{font-size:1.08rem;font-weight:600;line-height:1.65;color:#f0f0f0;margin-bottom:22px;}
  .options-grid{display:flex;flex-direction:column;gap:11px;}
  .option-btn{
    display:flex;align-items:center;gap:13px;
    background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:13px 17px;cursor:pointer;
    transition:all .22s ease;text-align:left;color:#ddd;
    font-size:0.95rem;font-family:inherit;line-height:1.5;
  }
  .option-btn:hover:not(:disabled){background:rgba(233,108,67,.13);border-color:#e96c43;transform:translateX(4px);}
  .option-badge{
    width:32px;height:32px;border-radius:50%;
    background:rgba(255,255,255,0.1);display:flex;
    align-items:center;justify-content:center;
    font-weight:700;font-size:0.83rem;flex-shrink:0;color:#f9a338;
  }
  .option-btn.correct{background:rgba(0,210,100,.2)!important;border-color:#00d264!important;color:#fff!important;}
  .option-btn.correct .option-badge{background:#00d264!important;color:#fff!important;}
  .option-btn.wrong{background:rgba(255,55,55,.2)!important;border-color:#ff3737!important;color:#fff!important;}
  .option-btn.wrong .option-badge{background:#ff3737!important;color:#fff!important;}
  .option-btn:disabled{cursor:not-allowed;transform:none!important;}
  .explanation-box{
    display:none;margin-top:20px;
    background:rgba(233,108,67,.07);border-left:4px solid #e96c43;
    border-radius:0 12px 12px 0;padding:16px 18px;animation:fadeIn .4s ease;
  }
  .explanation-box.show{display:block;}
  .exp-title{font-size:0.76rem;color:#f9a338;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
  .explanation-box p{color:#ccc;font-size:0.92rem;line-height:1.65;}
  .all-explanations{display:none;margin-top:14px;}
  .all-explanations.show{display:block;}
  .exp-option-row{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:0.87rem;color:#bbb;line-height:1.55;}
  .exp-option-row:last-child{border-bottom:none;}
  .exp-option-row strong{color:#f9a338;}
  .next-btn{
    display:none;margin-top:20px;width:100%;padding:15px;
    background:linear-gradient(90deg,#e96c43,#ffd200);border:none;
    border-radius:12px;font-size:1rem;font-weight:700;color:#1a0a00;
    cursor:pointer;transition:all .3s ease;font-family:inherit;letter-spacing:.5px;
  }
  .next-btn:hover{transform:scale(1.02);box-shadow:0 8px 25px rgba(233,108,67,.4);}
  .next-btn.show{display:block;}
  .result-screen{
    display:none;text-align:center;padding:40px 20px;
    background:rgba(255,255,255,0.05);border-radius:20px;
    border:1px solid rgba(255,255,255,0.1);
  }
  .result-screen.show{display:block;}
  .result-emoji{font-size:4rem;margin-bottom:14px;}
  .result-screen h2{
    font-size:1.9rem;font-weight:700;
    background:linear-gradient(90deg,#e96c43,#ffd200);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;
  }
  .big-score{font-size:3.4rem;font-weight:700;color:#f9a338;margin:16px 0;}
  .percentage{font-size:1.2rem;color:#aaa;margin-bottom:22px;}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
  .result-stat{background:rgba(255,255,255,0.06);border-radius:12px;padding:16px;}
  .result-stat .r-num{font-size:1.8rem;font-weight:700;}
  .result-stat .r-label{font-size:0.73rem;color:#888;margin-top:4px;}
  .correct-stat .r-num{color:#00d264;}
  .wrong-stat .r-num{color:#ff5555;}
  .total-stat .r-num{color:#f9a338;}
  .grade-badge{display:inline-block;padding:6px 18px;border-radius:50px;font-weight:700;font-size:0.88rem;margin-bottom:10px;}
  .restart-btn{
    padding:14px 38px;background:linear-gradient(90deg,#e96c43,#ffd200);
    border:none;border-radius:12px;font-size:1rem;font-weight:700;
    color:#1a0a00;cursor:pointer;transition:all .3s ease;font-family:inherit;
  }
  .restart-btn:hover{transform:scale(1.05);box-shadow:0 8px 28px rgba(233,108,67,.4);}
  @media(max-width:600px){.header h1{font-size:1.35rem;}.result-grid{grid-template-columns:1fr;}.big-score{font-size:2.4rem;}}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="set-badge">SET 3 — 100 BRAND NEW MCQs</div>
    <h1>🔥 Computer Software Quiz</h1>
    <p>100 एकदम नए प्रश्न | हिंदी में | सभी विकल्पों की व्याख्या सहित</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><div class="stat-label">प्रश्न</div><div class="stat-value" id="qCounter">1 / 100</div></div>
    <div class="stat-item"><div class="stat-label">✅ सही</div><div class="stat-value" id="correctCount">0</div></div>
    <div class="stat-item"><div class="stat-label">❌ गलत</div><div class="stat-value" id="wrongCount">0</div></div>
    <div class="stat-item"><div class="stat-label">🏆 स्कोर</div><div class="stat-value" id="scorePercent">0%</div></div>
    <div class="progress-wrap" style="width:100%"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-number" id="qNum">प्रश्न 1</div>
    <div class="question-text" id="qText"></div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="explanation-box" id="explanationBox">
      <div class="exp-title">✅ सही उत्तर की व्याख्या</div>
      <p id="correctExp"></p>
      <div class="all-explanations" id="allExplanations"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">अगला सवाल →</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="grade-badge" id="gradeBadge"></div>
    <h2>Quiz पूरा हुआ!</h2>
    <div class="big-score" id="finalScore"></div>
    <div class="percentage" id="finalPercent"></div>
    <div class="result-grid">
      <div class="result-stat correct-stat"><div class="r-num" id="rCorrect">0</div><div class="r-label">✅ सही उत्तर</div></div>
      <div class="result-stat wrong-stat"><div class="r-num" id="rWrong">0</div><div class="r-label">❌ गलत उत्तर</div></div>
      <div class="result-stat total-stat"><div class="r-num">100</div><div class="r-label">📋 कुल प्रश्न</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 फिर से शुरू करें</button>
  </div>

</div>
<script>
const allQuestions = [

  // ===== SECTION 1: SOFTWARE DEVELOPMENT & ENGINEERING (1-20) =====
  {
    q: "Software Development Life Cycle (SDLC) का सही क्रम क्या है?",
    options: ["Coding → Testing → Planning → Design", "Planning → Analysis → Design → Coding → Testing → Maintenance", "Testing → Coding → Design → Planning", "Design → Planning → Testing → Coding"],
    correct: 1,
    explanations: [
      "यह SDLC का सही क्रम नहीं है।",
      "✅ सही! SDLC का standard क्रम है: Planning → Requirements Analysis → System Design → Coding/Implementation → Testing → Deployment → Maintenance।",
      "यह भी गलत क्रम है।",
      "यह भी गलत है।"
    ]
  },
  {
    q: "Waterfall Model की मुख्य कमज़ोरी क्या है?",
    options: ["यह बहुत fast है", "एक phase पूरा होने के बाद पिछले phase में जाना बहुत मुश्किल होता है — changes costly हैं", "यह केवल small projects के लिए है", "यह Testing नहीं करता"],
    correct: 1,
    explanations: [
      "Waterfall fast नहीं होता।",
      "✅ सही! Waterfall Model में phases sequential होते हैं — एक बार Design phase पार होने पर Requirements change करना बहुत costly होता है।",
      "Waterfall large projects के लिए भी use होता था।",
      "Waterfall में Testing phase होता है।"
    ]
  },
  {
    q: "Scrum किस methodology का हिस्सा है?",
    options: ["Waterfall", "Agile", "Spiral Model", "V-Model"],
    correct: 1,
    explanations: [
      "Scrum Waterfall का हिस्सा नहीं।",
      "✅ सही! Scrum Agile framework का सबसे popular implementation है — इसमें Sprints (2-4 weeks), Daily Standups, Sprint Review होते हैं।",
      "Spiral Model risk-based model है।",
      "V-Model Verification और Validation पर focus करता है।"
    ]
  },
  {
    q: "Unit Testing किसे कहते हैं?",
    options: ["पूरे software को test करना", "Individual functions/modules को अलग-अलग test करना", "केवल UI test करना", "Network test करना"],
    correct: 1,
    explanations: [
      "पूरे software को test करना Integration/System Testing है।",
      "✅ सही! Unit Testing में software के smallest testable units (individual functions, methods, classes) को independently test किया जाता है।",
      "UI testing अलग है।",
      "Network testing अलग है।"
    ]
  },
  {
    q: "Integration Testing क्या है?",
    options: ["एक module को test करना", "Multiple modules को combine करके उनके interaction को test करना", "Final product को test करना", "User interface test करना"],
    correct: 1,
    explanations: [
      "Single module test = Unit Testing।",
      "✅ सही! Integration Testing में individual modules को combine करके देखते हैं कि वे सही तरीके से एक-दूसरे के साथ काम कर रहे हैं।",
      "Final product test = System Testing।",
      "UI test = UI Testing।"
    ]
  },
  {
    q: "Black Box Testing और White Box Testing में अंतर क्या है?",
    options: ["दोनों समान हैं", "Black Box: internal code जाने बिना test, White Box: internal code जानकर test", "Black Box: Hardware test, White Box: Software test", "Black Box: Fast test, White Box: Slow test"],
    correct: 1,
    explanations: [
      "दोनों अलग हैं।",
      "✅ सही! Black Box Testing में tester को code की जानकारी नहीं — केवल inputs/outputs test होते हैं। White Box में tester code जानता है और internal logic test करता है।",
      "दोनों software testing के types हैं।",
      "Speed से define नहीं होते।"
    ]
  },
  {
    q: "Regression Testing क्यों की जाती है?",
    options: ["नई features add करने के लिए", "Code changes के बाद यह verify करने के लिए कि पहले काम करने वाले features अभी भी सही काम कर रहे हैं", "Performance test करने के लिए", "Security test करने के लिए"],
    correct: 1,
    explanations: [
      "Features add करना development है।",
      "✅ सही! Regression Testing ensure करती है कि new code changes ने existing, working functionality को break नहीं किया — bug fix या new feature के बाद crucial है।",
      "Performance testing अलग है।",
      "Security testing अलग है।"
    ]
  },
  {
    q: "CI/CD का पूरा नाम क्या है?",
    options: ["Computer Integration/Computer Deployment", "Continuous Integration/Continuous Delivery (or Deployment)", "Code Input/Code Distribution", "Central Integration/Central Deployment"],
    correct: 1,
    explanations: [
      "यह CI/CD का नाम नहीं।",
      "✅ सही! CI/CD = Continuous Integration/Continuous Delivery (या Deployment)। इसमें code changes automatically test और deploy होते हैं — Jenkins, GitHub Actions इसके tools हैं।",
      "यह भी गलत है।",
      "यह भी गलत है।"
    ]
  },
  {
    q: "Code Review का क्या उद्देश्य होता है?",
    options: ["Code को delete करना", "Team members द्वारा code को check करना — bugs, quality issues और improvements find करना", "Code को compress करना", "Code को encrypt करना"],
    correct: 1,
    explanations: [
      "Code review delete नहीं करता।",
      "✅ सही! Code Review में developers एक-दूसरे का code review करते हैं — bugs early catch होते हैं, code quality बढ़ती है और knowledge sharing होती है।",
      "Review compression नहीं है।",
      "Review encryption नहीं है।"
    ]
  },
  {
    q: "Technical Debt क्या होता है?",
    options: ["Software का financial cost", "Quick/poor solution लिखने से future में extra work जमा होना जो later fix करना पड़े", "Software का license cost", "Server का maintenance cost"],
    correct: 1,
    explanations: [
      "Technical Debt financial debt नहीं है।",
      "✅ सही! Technical Debt वह accumulated work है जो shortcut लेने से होता है — poor code quality, missing tests, outdated dependencies जो future में fix करने पड़ते हैं।",
      "License cost financial है।",
      "Server maintenance अलग है।"
    ]
  },
  {
    q: "Design Pattern क्या होता है?",
    options: ["UI का color pattern", "Common software problems के proven, reusable solutions", "Database का structure", "Network का design"],
    correct: 1,
    explanations: [
      "Design Pattern UI से नहीं।",
      "✅ सही! Design Patterns recurring software design problems के best-practice solutions हैं — Singleton, Factory, Observer, MVC जैसे patterns proven reusable solutions हैं।",
      "Database structure ERD है।",
      "Network design network architecture है।"
    ]
  },
  {
    q: "MVC Architecture में 'V' का मतलब क्या है?",
    options: ["Version", "View — user को दिखने वाला UI component", "Variable", "Validator"],
    correct: 1,
    explanations: [
      "V = Version नहीं।",
      "✅ सही! MVC = Model-View-Controller। View वह component है जो user को UI दिखाता है। Model = data/business logic, Controller = request handle करता है।",
      "V = Variable नहीं।",
      "V = Validator नहीं।"
    ]
  },
  {
    q: "Refactoring क्या है?",
    options: ["Code की functionality बदलना", "External behavior बदले बिना internal code structure improve करना", "Code को delete करना", "New features add करना"],
    correct: 1,
    explanations: [
      "Refactoring functionality change नहीं करता।",
      "✅ सही! Refactoring में code की external behavior वही रहती है, लेकिन internal structure clean, readable और maintainable बनाया जाता है।",
      "Refactoring delete नहीं करता।",
      "Refactoring new features नहीं जोड़ता।"
    ]
  },
  {
    q: "Microservices में Service Discovery क्या काम करती है?",
    options: ["New services create करना", "Services को automatically locate और communicate करने देना बिना hardcoded addresses के", "Services को delete करना", "Services को deploy करना"],
    correct: 1,
    explanations: [
      "Service Discovery services create नहीं करती।",
      "✅ सही! Service Discovery mechanism services को एक-दूसरे को dynamically discover करने देता है — Consul, Eureka इसके tools हैं।",
      "Services delete करना अलग है।",
      "Deployment CI/CD pipeline करती है।"
    ]
  },
  {
    q: "Load Balancer का क्या काम है?",
    options: ["Data store करना", "Incoming traffic को multiple servers में distribute करना ताकि कोई एक server overloaded न हो", "Files compress करना", "Code compile करना"],
    correct: 1,
    explanations: [
      "Data store करना database का काम है।",
      "✅ सही! Load Balancer incoming requests को multiple backend servers में distribute करता है — high availability, fault tolerance और performance के लिए critical है।",
      "Compression अलग है।",
      "Compilation अलग है।"
    ]
  },
  {
    q: "REST API में HTTP GET method का उपयोग किसलिए होता है?",
    options: ["Data delete करने के लिए", "Data retrieve/read करने के लिए", "Data create करने के लिए", "Data update करने के लिए"],
    correct: 1,
    explanations: [
      "Delete के लिए HTTP DELETE method है।",
      "✅ सही! REST API में GET = Read/Retrieve data। POST = Create, PUT/PATCH = Update, DELETE = Delete। GET idempotent और safe operation है।",
      "Create के लिए POST method है।",
      "Update के लिए PUT/PATCH है।"
    ]
  },
  {
    q: "JSON का पूरा नाम क्या है?",
    options: ["Java Serialized Object Notation", "JavaScript Object Notation", "Joint Standard Object Network", "Java Standard Output Notation"],
    correct: 1,
    explanations: [
      "JSON Java-specific नहीं है।",
      "✅ सही! JSON = JavaScript Object Notation। यह lightweight data interchange format है जो human-readable है — APIs में widely used है।",
      "यह भी गलत है।",
      "यह भी गलत है।"
    ]
  },
  {
    q: "GraphQL, REST API से कैसे अलग है?",
    options: ["GraphQL केवल databases के लिए है", "GraphQL में client exactly वही data request कर सकता है जो चाहिए — over/under-fetching नहीं", "REST ज्यादा modern है", "दोनों समान हैं"],
    correct: 1,
    explanations: [
      "GraphQL databases के लिए नहीं — API query language है।",
      "✅ सही! GraphQL में client precise data request करता है — REST में fixed endpoints होते हैं जो extra या कम data दे सकते हैं। Facebook ने GraphQL बनाया।",
      "GraphQL newer है।",
      "दोनों अलग approaches हैं।"
    ]
  },
  {
    q: "Docker Image और Docker Container में क्या अंतर है?",
    options: ["दोनों समान हैं", "Image = static blueprint/template, Container = Image का running instance", "Container = blueprint, Image = running instance", "Image केवल Linux के लिए है"],
    correct: 1,
    explanations: [
      "Image और Container अलग हैं।",
      "✅ सही! Docker Image read-only template है (like a class)। Container उस Image का running instance है (like an object)। एक Image से multiple Containers बन सकते हैं।",
      "यह उल्टा है।",
      "Docker Images cross-platform हैं।"
    ]

// ===== QUIZ ENGINE =====
let questions=[], currentIndex=0, score=0, wrongAnswers=0, answered=false;

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function prepareQuestions(){
  questions=shuffle(allQuestions).map(q=>{
    const idx=shuffle([0,1,2,3]);
    return{
      q:q.q,
      options:idx.map(i=>q.options[i]),
      correct:idx.indexOf(q.correct),
      explanations:idx.map(i=>q.explanations[i])
    };
  });
}

function loadQuestion(){
  answered=false;
  const q=questions[currentIndex];
  document.getElementById('qNum').textContent=`प्रश्न ${currentIndex+1}`;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('qCounter').textContent=`${currentIndex+1} / 100`;
  document.getElementById('progressBar').style.width=`${(currentIndex/100)*100}%`;

  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((lbl,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-badge">${lbl}</span><span>${q.options[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  document.getElementById('explanationBox').classList.remove('show');
  document.getElementById('allExplanations').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(sel){
  if(answered)return;
  answered=true;
  const q=questions[currentIndex];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);

  if(sel===q.correct){
    btns[sel].classList.add('correct');
    score++;
    document.getElementById('correctCount').textContent=score;
  }else{
    btns[sel].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    wrongAnswers++;
    document.getElementById('wrongCount').textContent=wrongAnswers;
  }
  document.getElementById('scorePercent').textContent=Math.round((score/(currentIndex+1))*100)+'%';

  document.getElementById('correctExp').textContent=q.explanations[q.correct];
  const ae=document.getElementById('allExplanations');
  ae.innerHTML='<div style="font-size:.76rem;color:#f9a338;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">सभी विकल्पों की व्याख्या:</div>';
  ['A','B','C','D'].forEach((lbl,i)=>{
    const d=document.createElement('div');
    d.className='exp-option-row';
    d.innerHTML=`<strong>${lbl})</strong> ${q.options[i]}: ${q.explanations[i]}`;
    ae.appendChild(d);
  });
  document.getElementById('explanationBox').classList.add('show');
  document.getElementById('allExplanations').classList.add('show');
  const nb=document.getElementById('nextBtn');
  nb.textContent=currentIndex===99?'परिणाम देखें 🏆':'अगला सवाल →';
  nb.classList.add('show');
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex>=100){showResult();return;}
  loadQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showResult(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('statsBar').style.display='none';
  document.getElementById('resultScreen').classList.add('show');
  const pct=Math.round((score/100)*100);
  document.getElementById('finalScore').textContent=`${score} / 100`;
  document.getElementById('finalPercent').textContent=`सफलता प्रतिशत: ${pct}%`;
  document.getElementById('rCorrect').textContent=score;
  document.getElementById('rWrong').textContent=wrongAnswers;
  let emoji,grade,color;
  if(pct>=90){emoji='🏆';grade='Outstanding! अद्भुत';color='#ffd200';}
  else if(pct>=75){emoji='🌟';grade='Excellent! उत्कृष्ट';color='#43e97b';}
  else if(pct>=60){emoji='👏';grade='Good! बहुत अच्छे';color='#38f9d7';}
  else if(pct>=40){emoji='📚';grade='Average — और पढ़ें';color='#f9a338';}
  else{emoji='💪';grade='Keep Going! हिम्मत रखो';color='#ff6b6b';}
  document.getElementById('resultEmoji').textContent=emoji;
  const b=document.getElementById('gradeBadge');
  b.textContent=grade;
  b.style.cssText=`background:${color}22;color:${color};border:1px solid ${color}55;`;
}

function restartQuiz(){
  score=0;wrongAnswers=0;currentIndex=0;
  document.getElementById('correctCount').textContent='0';
  document.getElementById('wrongCount').textContent='0';
  document.getElementById('scorePercent').textContent='0%';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display='block';
  document.getElementById('statsBar').style.display='flex';
  prepareQuestions();
  loadQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

prepareQuestions();
loadQuestion();
</script>
