<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Computer Software Quiz — Set 5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0e0e1a;--card:#1a1a2e;--card2:#16213e;--border:#ffffff14;--accent:#7c3aed;--accent2:#06b6d4;--accent3:#10b981;--warn:#ef4444;--gold:#f59e0b;--text:#f1f5f9;--muted:#94a3b8;--r:16px;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,'Noto Sans Devanagari','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;overflow-x:hidden;}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:30px;}
/* STATUS BAR */
.sbar{background:linear-gradient(135deg,#7c3aed,#06b6d4);padding:14px 20px 18px;position:sticky;top:0;z-index:100;}
.sbar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sbar-title{font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.9;}
.score-pill{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:50px;font-size:.78rem;font-weight:700;backdrop-filter:blur(10px);}
.prog-row{display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:6px;background:rgba(255,255,255,.25);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:#fff;border-radius:50px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%;}
.q-lbl{font-size:.72rem;font-weight:700;opacity:.9;white-space:nowrap;}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px 16px 0;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;}
.sv{font-size:1.4rem;font-weight:800;}.sv.g{color:var(--accent3);}.sv.r{color:var(--warn);}.sv.b{color:var(--accent2);}
.sl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
/* QUESTION */
.qwrap{padding:14px 16px 0;}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;animation:su .3s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.qbadge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#7c3aed22,#06b6d422);border:1px solid #7c3aed44;color:#a78bfa;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.qtext{font-size:1rem;font-weight:600;line-height:1.65;color:#e2e8f0;}
/* OPTIONS */
.owrap{padding:10px 16px 0;}
.obtn{width:100%;display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .2s ease;text-align:left;color:var(--text);font-size:.93rem;font-family:inherit;line-height:1.5;margin-bottom:10px;-webkit-appearance:none;}
.obtn:hover:not(:disabled){border-color:#7c3aed;transform:translateX(3px);background:#1e1e35;}
.obtn:active:not(:disabled){transform:scale(.98);}
.oltr{min-width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;color:#a78bfa;flex-shrink:0;transition:all .2s;border:1.5px solid rgba(124,58,237,.3);}
.otxt{font-size:.9rem;line-height:1.5;flex:1;}
.oico{margin-left:auto;font-size:1.1rem;flex-shrink:0;}
.obtn.correct{background:#052e16!important;border-color:#16a34a!important;}
.obtn.correct .oltr{background:#16a34a!important;color:#fff!important;border-color:#16a34a!important;}
.obtn.correct .otxt{color:#86efac!important;}
.obtn.wrong{background:#2d0d0d!important;border-color:#dc2626!important;}
.obtn.wrong .oltr{background:#dc2626!important;color:#fff!important;border-color:#dc2626!important;}
.obtn.wrong .otxt{color:#fca5a5!important;}
.obtn:disabled{cursor:default;transform:none!important;}
/* EXPLANATION */
.epanel{margin:10px 16px 0;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:su .35s ease;display:none;}
.epanel.show{display:block;}
.ehdr{background:linear-gradient(135deg,#7c3aed22,#06b6d422);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;}
.ehdrtxt{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#a78bfa;}
.ecbox{padding:14px 16px;border-bottom:1px solid var(--border);}
.eclbl{font-size:.68rem;color:var(--accent3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.ectxt{font-size:.88rem;color:#cbd5e1;line-height:1.6;}
.eatitle{padding:10px 16px 6px;font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.erow{display:flex;gap:10px;padding:9px 16px;border-top:1px solid var(--border);font-size:.83rem;color:#94a3b8;line-height:1.5;}
.erltr{min-width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.72rem;color:#a78bfa;flex-shrink:0;}
.ertxt{flex:1;}.ertxt strong{color:#c4b5fd;}
/* NEXT BUTTON */
.nwrap{padding:12px 16px 0;display:none;}.nwrap.show{display:block;}
.nbtn{width:100%;padding:16px;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;border-radius:14px;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:all .25s ease;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(124,58,237,.35);}
.nbtn:active{transform:scale(.97);}
/* RESULT */
.rscreen{display:none;padding:24px 16px;animation:su .4s ease;}.rscreen.show{display:block;}
.rhero{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:14px;}
.remoji{font-size:4.5rem;margin-bottom:10px;display:block;}
.rgrade{display:inline-block;padding:6px 20px;border-radius:50px;font-weight:800;font-size:.85rem;margin-bottom:14px;letter-spacing:.5px;}
.rtitle{font-size:1.5rem;font-weight:800;margin-bottom:6px;}
.rbig{font-size:3.8rem;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:10px 0 4px;}
.rpct{font-size:1rem;color:var(--muted);}
.rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0 0;}
.rsc{background:rgba(255,255,255,.05);border-radius:12px;padding:14px 10px;text-align:center;}
.rnum{font-size:1.9rem;font-weight:800;}.rnum.g{color:var(--accent3);}.rnum.r{color:var(--warn);}.rnum.b{color:var(--accent2);}
.rlbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}
.rmsg{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;font-size:.88rem;color:#cbd5e1;line-height:1.65;text-align:center;}
.rbtn{width:100%;padding:17px;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;border-radius:14px;font-size:1.05rem;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(124,58,237,.4);transition:all .25s ease;}
.rbtn:active{transform:scale(.97);}
/* SPLASH */
.splash{padding:60px 28px 40px;text-align:center;animation:su .4s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
.slogo{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 20px;box-shadow:0 8px 32px rgba(124,58,237,.4);}
.splash h1{font-size:1.6rem;font-weight:800;margin-bottom:8px;}
.splash h1 span{background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.splash p{color:var(--muted);font-size:.95rem;line-height:1.6;margin-bottom:36px;}

.stbtn{width:100%;padding:18px;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;border-radius:14px;font-size:1.1rem;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;box-shadow:0 6px 28px rgba(124,58,237,.45);transition:all .25s ease;}
.stbtn:active{transform:scale(.97);}
@media(min-width:481px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 60px rgba(124,58,237,.1);}}
</style>
</head>
<body>
<div class="app">

<!-- SPLASH -->
<div class="splash" id="splashScreen">
  <div class="slogo">💻</div>
  <h1>Computer Software<br><span>Quiz — Set 5</span></h1>
  <p>100 बिल्कुल नए MCQs • हिंदी में</p>
  <button class="stbtn" onclick="startQuiz()">🚀 Quiz शुरू करें</button>
</div>

<!-- QUIZ -->
<div id="quizScreen" style="display:none;">
  <div class="sbar">
    <div class="sbar-top"><span class="sbar-title">💻 CS Quiz — Set 5</span><span class="score-pill" id="scorePill">Score: 0</span></div>
    <div class="prog-row"><div class="prog-track"><div class="prog-fill" id="progFill"></div></div><span class="q-lbl" id="qLbl">1/100</span></div>
  </div>
  <div class="stats">
    <div class="sc"><div class="sv g" id="sC">0</div><div class="sl">✅ सही</div></div>
    <div class="sc"><div class="sv r" id="sW">0</div><div class="sl">❌ गलत</div></div>
    <div class="sc"><div class="sv b" id="sP">0%</div><div class="sl">🎯 Accuracy</div></div>
  </div>
  <div class="qwrap">
    <div class="qcard">
      <div class="qbadge">📌 <span id="qBadge">प्रश्न 1 / 100</span></div>
      <div class="qtext" id="qText"></div>
    </div>
  </div>
  <div class="owrap" id="owrap"></div>
  <div class="epanel" id="epanel">
    <div class="ehdr"><span>💡</span><span class="ehdrtxt">विस्तृत व्याख्या</span></div>
    <div class="ecbox"><div class="eclbl">✅ सही उत्तर की व्याख्या</div><div class="ectxt" id="ectxt"></div></div>
    <div class="eatitle">📚 सभी विकल्पों की व्याख्या</div>
    <div id="erows"></div>
  </div>
  <div class="nwrap" id="nwrap"><button class="nbtn" id="nbtn" onclick="nextQ()">अगला सवाल →</button></div>
</div>

<!-- RESULT -->
<div class="rscreen" id="rscreen">
  <div class="rhero">
    <span class="remoji" id="rEmoji">🏆</span>
    <div class="rgrade" id="rGrade"></div>
    <div class="rtitle">Quiz पूरा हुआ!</div>
    <div class="rbig" id="rBig"></div>
    <div class="rpct" id="rPct"></div>
    <div class="rgrid">
      <div class="rsc"><div class="rnum g" id="rC">0</div><div class="rlbl">✅ सही</div></div>
      <div class="rsc"><div class="rnum r" id="rW">0</div><div class="rlbl">❌ गलत</div></div>
      <div class="rsc"><div class="rnum b">100</div><div class="rlbl">📋 कुल</div></div>
    </div>
  </div>
  <div class="rmsg" id="rMsg"></div>
  <button class="rbtn" onclick="restartQuiz()">🔄 फिर से शुरू करें</button>
</div>

</div>
<script>
const RAW=[
{q:"Linux में 'chmod 755' command क्या करता है?",o:["File delete करता है","Owner को rwx, Group/Others को r-x permission देता है — 7=rwx, 5=r-x","File को hidden करता है","File size बदलता है"],c:1,e:["chmod delete नहीं करता।","✅ सही! chmod 755: 7=Owner(rwx), 5=Group(r-x), 5=Others(r-x)। Numeric: r=4, w=2, x=1।","Hidden files dot prefix से होती हैं।","File size resize से बदलती है।"]},
{q:"Bash Script में '#!/bin/bash' (Shebang) क्यों लिखते हैं?",o:["Comment है","Script किस interpreter से run हो यह specify करता है","Copyright notice है","Script का नाम है"],c:1,e:["Shebang comment नहीं।","✅ सही! Shebang (#!) OS को बताती है कि script को किस interpreter से execute करना है।","Copyright अलग है।","Script नाम filename होती है।"]},
{q:"Linux में 'grep' command का क्या उपयोग है?",o:["Files delete करना","Files या text में pattern/string search करना","Disk space check करना","Network test करना"],c:1,e:["rm files delete करता है।","✅ सही! grep files में pattern search करता है — grep 'error' log.txt।","df/du disk space check करते हैं।","ping network test करता है।"]},
{q:"Cron Job किसलिए use होता है?",o:["Manual task run करने के लिए","Tasks को scheduled time पर automatically run करने के लिए","Files compress करने के लिए","Network configure करने के लिए"],c:1,e:["Cron automated है।","✅ सही! Cron daemon tasks को scheduled intervals पर automatically execute करता है।","Compression tar/gzip करता है।","Network ifconfig/ip करता है।"]},
{q:"Linux में 'pipe' (|) का उपयोग क्या है?",o:["Files को join करना","एक command का output दूसरे command का input बनाना","Pipeline delete करना","Files rename करना"],c:1,e:["File join cat से होता है।","✅ सही! Pipe एक command का stdout दूसरे के stdin से connect करता है — ls | grep '.txt'।","Pipeline delete नहीं होता।","mv files rename करता है।"]},
{q:"'sudo' command Linux में क्या करता है?",o:["Files delete करता है","Regular user को root privileges से specific commands execute करने देता है","Network restart करता है","System shutdown करता है"],c:1,e:["sudo delete नहीं करता।","✅ सही! sudo temporarily root privileges से specific commands run करने देता है।","Network restart अलग है।","shutdown/poweroff से system बंद होता है।"]},
{q:"Environment Variable क्या होता है?",o:["Variable जो environment में visible हो","Process के लिए available named value — PATH, HOME, USER जैसे OS-level values","Database variable","HTML variable"],c:1,e:["Technically correct पर incomplete।","✅ सही! Environment Variables OS-level named values हैं — PATH, HOME, USER — processes को configuration देते हैं।","Database variables SQL में हैं।","HTML variables CSS properties हैं।"]},
{q:"Linux में 'kill -9 PID' क्या करता है?",o:["Process को gracefully stop करता है","SIGKILL signal से process को forcefully terminate करता है","Process pause करता है","Process restart करता है"],c:1,e:["Graceful stop kill -15 (SIGTERM) है।","✅ सही! kill -9 SIGKILL भेजता है — process ignore नहीं कर सकती, immediately terminate।","SIGSTOP pause करता है।","Service restart अलग है।"]},
{q:"Virtual Environment (Python) क्यों use करते हैं?",o:["Python fast बनाने के लिए","Project-specific isolated environment — different projects के अलग dependencies, no conflicts","Internet connection के लिए","GUI बनाने के लिए"],c:1,e:["Virtual env speed से नहीं।","✅ सही! Python venv/conda isolated environment बनाता है — एक project में Django 3.0, दूसरे में 4.0 बिना conflict।","Internet से नहीं।","GUI tkinter/PyQt से बनता है।"]},
{q:"SSH (Secure Shell) किसलिए use होता है?",o:["Files compress करने के लिए","Remote computer पर securely encrypted connection से login और commands run करने के लिए","Database connect करने के लिए","Website build करने के लिए"],c:1,e:["SSH compression primarily नहीं।","✅ सही! SSH encrypted protocol है remote systems securely access करने के लिए।","Database connections अलग protocols हैं।","Web development अलग है।"]},
{q:"Public Key Cryptography में क्या होता है?",o:["एक ही key से encrypt और decrypt","Public key से encrypt, Private key से decrypt — asymmetric key pair","दोनों keys same होती हैं","Password से encrypt"],c:1,e:["Symmetric cryptography में एक key।","✅ सही! Asymmetric Cryptography: Public Key (share करते हैं) से encrypt, Private Key (secret) से decrypt। RSA, ECC examples।","Keys अलग होती हैं।","Password-based encryption symmetric है।"]},
{q:"OWASP Top 10 क्या है?",o:["Top 10 programming languages","Web Application Security के 10 most critical risks की list","Top 10 software companies","Top 10 operating systems"],c:1,e:["OWASP languages से नहीं।","✅ सही! OWASP Top 10 web app की most critical security vulnerabilities की list है — Injection, Broken Auth, XSS आदि।","Company list नहीं।","OS list नहीं।"]},
{q:"Cross-Site Scripting (XSS) क्या है?",o:["CSS styling attack","Malicious scripts को web pages में inject करना जो other users के browsers में execute हों","Cross-site search","XML attack"],c:1,e:["XSS CSS से नहीं।","✅ सही! XSS में attacker malicious JavaScript inject करता है — cookie theft, session hijacking।","XSS search नहीं।","XSS XML से नहीं।"]},
{q:"Penetration Testing क्या है?",o:["Software performance test","Authorized simulated attack — security vulnerabilities ढूंढने के लिए ethical hacking","Network speed test","Database performance test"],c:1,e:["Performance testing अलग।","✅ सही! Pen Testing में authorized professionals system को real attacker की तरह attack करते हैं।","Network speed test अलग।","Database testing अलग।"]},
{q:"Salting (Password में) क्यों किया जाता है?",o:["Passwords को tastier बनाना","Hash से पहले random string add करना — rainbow table attacks prevent करना","Password encrypt करना","Password compress करना"],c:1,e:["Literal food नहीं।","✅ सही! Salt random string है — hash(password+salt) — same passwords के अलग hashes, rainbow tables ineffective।","Salting ≠ encrypting।","Compression अलग है।"]},
{q:"Honeypot (Cybersecurity में) क्या है?",o:["Network firewall","Decoy system जो attackers को attract करे — attack patterns monitor करने के लिए","Password manager","Antivirus tool"],c:1,e:["Honeypot firewall नहीं।","✅ सही! Honeypot fake vulnerable system है — attackers इसे target करते हैं, security team attack techniques observe करती है।","Password manager अलग।","Antivirus अलग।"]},
{q:"Brute Force Attack से बचने का best practice क्या है?",o:["Simple passwords","Account lockout, CAPTCHA, Rate limiting, MFA — combination","Longer passwords only","Firewalls only"],c:1,e:["Simple passwords vulnerable।","✅ सही! Multiple countermeasures: Account lockout, CAPTCHA, Rate limiting, MFA — combination सबसे effective।","Longer password एक factor।","Firewalls alone काफी नहीं।"]},
{q:"Social Engineering Attack में क्या होता है?",o:["Social media hacking","Human psychology exploit करके sensitive information reveal कराना — technical नहीं","Social website attack","Network attack"],c:1,e:["Social engineering specific social media नहीं।","✅ सही! Phishing, Pretexting, Baiting — human manipulation से confidential info लेना।","Social website अलग।","यह human-focused है।"]},
{q:"CVE क्या है?",o:["Computer Virus Encyclopedia","Common Vulnerabilities and Exposures — publicly disclosed vulnerabilities की standardized list","Certificate Verification Engine","Cyber Vulnerability Encryption"],c:1,e:["CVE virus encyclopedia नहीं।","✅ सही! CVE = Common Vulnerabilities and Exposures — publicly known security vulnerabilities के standardized IDs। MITRE maintain करता है।","Certificate verification अलग।","Vulnerability database है।"]},
{q:"Steganography क्या है?",o:["Strong encryption","Secret data को innocuous files (images, audio) में छुपाना — existence of message hidden","Stenography","Password hashing"],c:1,e:["Steganography encryption नहीं — hiding है।","✅ सही! Steganography data को cover media में छुपाता है — image pixels में secret message।","Stenography shorthand writing है।","Password hashing अलग।"]},

let qs=[],ci=0,cor=0,wr=0,ans=false;
function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function prep(){qs=sh(RAW).map(q=>{const idx=sh([0,1,2,3]);return{q:q.q,o:idx.map(i=>q.o[i]),c:idx.indexOf(q.c),e:idx.map(i=>q.e[i])};});}
function startQuiz(){document.getElementById('splashScreen').style.display='none';document.getElementById('quizScreen').style.display='block';prep();ci=0;cor=0;wr=0;loadQ();}
function loadQ(){
  ans=false;
  const q=qs[ci];
  document.getElementById('progFill').style.width=(ci/100*100)+'%';
  document.getElementById('qLbl').textContent=(ci+1)+'/100';
  document.getElementById('scorePill').textContent='Score: '+cor;
  document.getElementById('qBadge').textContent='प्रश्न '+(ci+1)+' / 100';
  document.getElementById('qText').textContent=q.q;
  const w=document.getElementById('owrap');w.innerHTML='';
  ['A','B','C','D'].forEach((L,i)=>{
    const b=document.createElement('button');b.className='obtn';
    b.innerHTML=`<span class="oltr">${L}</span><span class="otxt">${q.o[i]}</span>`;
    b.onclick=()=>pick(i);w.appendChild(b);
  });
  document.getElementById('epanel').classList.remove('show');
  document.getElementById('nwrap').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
}
function pick(sel){
  if(ans)return;ans=true;
  const q=qs[ci];
  const bs=document.querySelectorAll('.obtn');
  bs.forEach(b=>b.disabled=true);
  if(sel===q.c){bs[sel].classList.add('correct');bs[sel].insertAdjacentHTML('beforeend','<span class="oico">✅</span>');cor++;}
  else{bs[sel].classList.add('wrong');bs[sel].insertAdjacentHTML('beforeend','<span class="oico">❌</span>');bs[q.c].classList.add('correct');bs[q.c].insertAdjacentHTML('beforeend','<span class="oico">✅</span>');wr++;}
  document.getElementById('sC').textContent=cor;
  document.getElementById('sW').textContent=wr;
  document.getElementById('sP').textContent=Math.round(cor/(ci+1)*100)+'%';
  document.getElementById('scorePill').textContent='Score: '+cor;
  document.getElementById('ectxt').textContent=q.e[q.c];
  const er=document.getElementById('erows');er.innerHTML='';
  ['A','B','C','D'].forEach((L,i)=>{
    const d=document.createElement('div');d.className='erow';
    d.innerHTML=`<span class="erltr">${L}</span><span class="ertxt"><strong>${q.o[i]}:</strong> ${q.e[i]}</span>`;
    er.appendChild(d);
  });
  document.getElementById('epanel').classList.add('show');
  document.getElementById('nbtn').textContent=ci===99?'🏆 परिणाम देखें':'अगला सवाल →';
  document.getElementById('nwrap').classList.add('show');
}
function nextQ(){ci++;if(ci>=100){showResult();return;}loadQ();}
function showResult(){
  document.getElementById('quizScreen').style.display='none';
  const rs=document.getElementById('rscreen');rs.classList.add('show');
  const pct=Math.round(cor/100*100);
  document.getElementById('rBig').textContent=cor+'/100';
  document.getElementById('rPct').textContent=pct+'% सफलता';
  document.getElementById('rC').textContent=cor;
  document.getElementById('rW').textContent=wr;
  let emoji,grade,color,msg;
  if(pct>=95){emoji='🏆';grade='LEGENDARY!';color='#f59e0b';msg='अविश्वसनीय! आप Computer Science के true Master हैं। इस level की knowledge से किसी भी tech interview में top करेंगे!';}
  else if(pct>=85){emoji='🌟';grade='OUTSTANDING!';color='#10b981';msg='शानदार! आपकी CS depth exceptional है। Top tech companies के interviews के लिए पूरी तरह ready हैं!';}
  else if(pct>=75){emoji='🚀';grade='EXCELLENT!';color='#06b6d4';msg='बहुत अच्छे! Strong fundamentals हैं। कुछ advanced topics और practice से आप एक expert बनेंगे!';}
  else if(pct>=60){emoji='👏';grade='GOOD JOB!';color='#8b5cf6';msg='अच्छा प्रदर्शन! Regular study से हर topic clear होगा। Keep it up!';}
  else if(pct>=40){emoji='📚';grade='KEEP GOING!';color='#f59e0b';msg='अभ्यास जारी रखें! Sets 1-5 के explanations ध्यान से पढ़ें — improvement आएगी!';}
  else{emoji='💪';grade='START FRESH!';color='#ef4444';msg='हर expert पहले beginner था। Concepts से शुरू करें, explanations पढ़ें — आप जरूर improve करेंगे!';}
  document.getElementById('rEmoji').textContent=emoji;
  const gb=document.getElementById('rGrade');gb.textContent=grade;
  gb.style.cssText=`background:${color}22;color:${color};border:1px solid ${color}44;`;
  document.getElementById('rMsg').textContent=msg;
  window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){cor=0;wr=0;ci=0;document.getElementById('rscreen').classList.remove('show');document.getElementById('quizScreen').style.display='block';prep();loadQ();}
</script>
