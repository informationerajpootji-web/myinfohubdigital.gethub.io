<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Software MCQ Quiz - 100 Questions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans Devanagari', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    padding: 30px 20px 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }

  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .header p { color: #aaa; font-size: 0.9rem; }

  /* SCORE & PROGRESS */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 14px 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    flex-wrap: wrap;
    gap: 10px;
  }

  .stat-item { text-align: center; }
  .stat-label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.4rem; font-weight: 700; color: #ffd200; }

  .progress-wrap {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 10px;
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    border-radius: 50px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* QUESTION CARD */
  .question-card {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
  }

  .question-number {
    font-size: 0.8rem;
    color: #f7971e;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .question-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.6;
    color: #f0f0f0;
    margin-bottom: 22px;
  }

  /* OPTIONS */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    color: #e0e0e0;
    font-size: 0.97rem;
    font-family: inherit;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(247,151,30,0.15);
    border-color: #f7971e;
    transform: translateX(4px);
  }

  .option-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    color: #ffd200;
  }

  /* CORRECT / WRONG */
  .option-btn.correct {
    background: rgba(0, 200, 100, 0.2) !important;
    border-color: #00c864 !important;
    color: #fff !important;
  }

  .option-btn.correct .option-badge {
    background: #00c864 !important;
    color: #fff !important;
  }

  .option-btn.wrong {
    background: rgba(255, 60, 60, 0.2) !important;
    border-color: #ff3c3c !important;
    color: #fff !important;
  }

  .option-btn.wrong .option-badge {
    background: #ff3c3c !important;
    color: #fff !important;
  }

  .option-btn:disabled { cursor: not-allowed; transform: none !important; }

  /* EXPLANATION */
  .explanation-box {
    display: none;
    margin-top: 20px;
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #f7971e;
    border-radius: 0 12px 12px 0;
    padding: 16px 18px;
    animation: fadeIn 0.4s ease;
  }

  .explanation-box.show { display: block; }

  .explanation-box .exp-title {
    font-size: 0.78rem;
    color: #f7971e;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .explanation-box p {
    color: #ccc;
    font-size: 0.93rem;
    line-height: 1.65;
  }

  .all-explanations {
    display: none;
    margin-top: 14px;
  }

  .all-explanations.show { display: block; }

  .exp-option-row {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-size: 0.88rem;
    color: #bbb;
    line-height: 1.5;
  }

  .exp-option-row:last-child { border-bottom: none; }
  .exp-option-row strong { color: #ffd200; }

  /* NEXT BUTTON */
  .next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a2e;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.5px;
  }

  .next-btn:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(247,151,30,0.4); }
  .next-btn.show { display: block; }

  /* RESULT SCREEN */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .result-screen.show { display: block; }

  .result-emoji { font-size: 4rem; margin-bottom: 16px; }

  .result-screen h2 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .result-screen .big-score {
    font-size: 3.5rem;
    font-weight: 700;
    color: #ffd200;
    margin: 16px 0;
  }

  .result-screen .percentage {
    font-size: 1.3rem;
    color: #aaa;
    margin-bottom: 24px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .result-stat {
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 16px;
  }

  .result-stat .r-num { font-size: 1.8rem; font-weight: 700; }
  .result-stat .r-label { font-size: 0.75rem; color: #888; margin-top: 4px; }
  .correct-stat .r-num { color: #00c864; }
  .wrong-stat .r-num { color: #ff3c3c; }
  .total-stat .r-num { color: #ffd200; }

  .restart-btn {
    padding: 15px 40px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a2e;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .restart-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(247,151,30,0.4); }

  .grade-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 10px;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .question-card { animation: fadeIn 0.35s ease; }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.4rem; }
    .result-grid { grid-template-columns: 1fr; }
    .big-score { font-size: 2.5rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>💻 Computer Software Quiz</h1>
    <p>100 MCQs | हिंदी में | सभी विकल्पों की व्याख्या सहित</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-label">प्रश्न</div>
      <div class="stat-value" id="qCounter">1 / 100</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">✅ सही</div>
      <div class="stat-value" id="correctCount">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">❌ गलत</div>
      <div class="stat-value" id="wrongCount">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">🏆 स्कोर</div>
      <div class="stat-value" id="scorePercent">0%</div>
    </div>
    <div class="progress-wrap" style="width:100%">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-number" id="qNum">प्रश्न 1</div>
    <div class="question-text" id="qText"></div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="explanation-box" id="explanationBox">
      <div class="exp-title">✅ सही उत्तर की व्याख्या</div>
      <p id="correctExp"></p>
      <div class="all-explanations" id="allExplanations"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">अगला सवाल →</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="grade-badge" id="gradeBadge"></div>
    <h2>Quiz पूरा हुआ!</h2>
    <div class="big-score" id="finalScore"></div>
    <div class="percentage" id="finalPercent"></div>
    <div class="result-grid">
      <div class="result-stat correct-stat">
        <div class="r-num" id="rCorrect">0</div>
        <div class="r-label">✅ सही उत्तर</div>
      </div>
      <div class="result-stat wrong-stat">
        <div class="r-num" id="rWrong">0</div>
        <div class="r-label">❌ गलत उत्तर</div>
      </div>
      <div class="result-stat total-stat">
        <div class="r-num">100</div>
        <div class="r-label">📋 कुल प्रश्न</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 फिर से शुरू करें</button>
  </div>

</div>

<script>
const allQuestions = [
  // ===== SOFTWARE CATEGORIES (1-20) =====
  {
    q: "सिस्टम सॉफ्टवेयर का मुख्य कार्य क्या है?",
    options: ["उपयोगकर्ता को गेम खेलने देना", "हार्डवेयर और एप्लिकेशन के बीच इंटरफ़ेस प्रदान करना", "इंटरनेट ब्राउज़ करना", "दस्तावेज़ प्रिंट करना"],
    correct: 1,
    explanations: [
      "यह गलत है — गेम खेलना Application Software का काम है।",
      "✅ सही! System Software हार्डवेयर और एप्लिकेशन के बीच अब्स्ट्रक्शन लेयर का काम करता है।",
      "इंटरनेट ब्राउज़ करना Application Software (Browser) का काम है।",
      "प्रिंट करना एप्लिकेशन और Device Driver का संयुक्त कार्य है।"
    ]
  },
  {
    q: "निम्नलिखित में से कौन सा System Software का उदाहरण है?",
    options: ["Microsoft Word", "Adobe Photoshop", "Linux Operating System", "Google Chrome"],
    correct: 2,
    explanations: [
      "Microsoft Word एक Application Software (Word Processor) है।",
      "Adobe Photoshop एक Application Software (Graphics) है।",
      "✅ सही! Linux एक Operating System है जो System Software की श्रेणी में आता है।",
      "Google Chrome एक Application Software (Web Browser) है।"
    ]
  },
  {
    q: "एप्लिकेशन सॉफ्टवेयर किसके लिए डिज़ाइन किया जाता है?",
    options: ["CPU प्रबंधन के लिए", "हार्डवेयर ड्राइवर के लिए", "अंतिम उपयोगकर्ता के विशिष्ट कार्यों के लिए", "कर्नेल प्रबंधन के लिए"],
    correct: 2,
    explanations: [
      "CPU प्रबंधन Operating System (System Software) का काम है।",
      "Hardware Driver System Software का हिस्सा है।",
      "✅ सही! Application Software End-User के specific tasks (Word Processing, Browsing आदि) के लिए बनाया जाता है।",
      "Kernel प्रबंधन Operating System का काम है।"
    ]
  },
  {
    q: "Embedded Software किस प्रकार के डिवाइस में पाया जाता है?",
    options: ["केवल Desktop कंप्यूटर में", "माइक्रोवेव, कार, ATM जैसे हार्डवेयर डिवाइस में", "केवल Servers में", "केवल Smartphones में"],
    correct: 1,
    explanations: [
      "Desktop कंप्यूटर में System और Application Software होता है, Embedded नहीं।",
      "✅ सही! Embedded Software हार्डवेयर डिवाइस जैसे माइक्रोवेव, कार ECU, ATM में built-in होता है।",
      "Servers में Server OS चलता है, Embedded नहीं।",
      "Smartphones में Android/iOS चलता है जो Embedded का हिस्सा है लेकिन यह पूरी श्रेणी नहीं है।"
    ]
  },
  {
    q: "Proprietary Software की विशेषता क्या है?",
    options: ["इसका Source Code सार्वजनिक होता है", "इसे मुफ्त में बदला जा सकता है", "इसका Source Code गोपनीय होता है और License खरीदना पड़ता है", "यह हमेशा मुफ्त होता है"],
    correct: 2,
    explanations: [
      "Source Code सार्वजनिक होना Open Source की विशेषता है।",
      "मुफ्त में बदलना Open Source की विशेषता है।",
      "✅ सही! Proprietary Software का Source Code Closed-Source होता है और उपयोग के लिए License खरीदना पड़ता है।",
      "Proprietary Software हमेशा paid होता है (जैसे Windows, Photoshop)।"
    ]
  },
  {
    q: "Open Source Software का उदाहरण कौन सा है?",
    options: ["Microsoft Windows", "Adobe Photoshop", "AutoCAD", "Linux"],
    correct: 3,
    explanations: [
      "Microsoft Windows Proprietary Software है।",
      "Adobe Photoshop Proprietary Software है।",
      "AutoCAD Proprietary Software है।",
      "✅ सही! Linux Open Source है — इसका Source Code GNU GPL License के तहत सार्वजनिक है।"
    ]
  },
  {
    q: "कौन सा सॉफ्टवेयर WYSIWYG इंटरफ़ेस प्रदान करता है?",
    options: ["Linux Kernel", "Microsoft Word (एप्लिकेशन सॉफ्टवेयर)", "Device Driver", "BIOS"],
    correct: 1,
    explanations: [
      "Linux Kernel System Software है, इसमें WYSIWYG नहीं होता।",
      "✅ सही! Microsoft Word जैसे Word Processors में WYSIWYG (What You See Is What You Get) interface होता है।",
      "Device Driver हार्डवेयर कम्युनिकेशन के लिए है।",
      "BIOS System Software है जो बूटिंग के समय काम करता है।"
    ]
  },
  {
    q: "Android Operating System किस आर्किटेक्चर पर आधारित है?",
    options: ["Windows NT Kernel", "Linux Kernel", "macOS Kernel (XNU)", "DOS"],
    correct: 1,
    explanations: [
      "Windows NT Kernel Microsoft Windows में उपयोग होता है।",
      "✅ सही! Android का आधार Linux Kernel है जो Hardware Abstraction प्रदान करता है।",
      "macOS का Kernel XNU है जो Apple सिस्टम में है।",
      "DOS बहुत पुराना और सरल OS था।"
    ]
  },
  {
    q: "Utility Software का कार्य क्या है?",
    options: ["वीडियो गेम खेलना", "System Maintenance और Optimization", "Web Browsing करना", "Email लिखना"],
    correct: 1,
    explanations: [
      "Video Game खेलना Application Software का काम है।",
      "✅ सही! Utility Software जैसे Antivirus, Disk Cleanup, Backup Tools सिस्टम को maintain और optimize करते हैं।",
      "Web Browsing Application Software (Browser) का काम है।",
      "Email लिखना Application Software (Email Client) का काम है।"
    ]
  },
  {
    q: "Open Source Software में GNU GPL License का क्या अर्थ है?",
    options: ["Software केवल पढ़ा जा सकता है", "Source Code को संशोधित और वितरित किया जा सकता है", "Software केवल commercial उपयोग के लिए है", "Software में बदलाव नहीं किया जा सकता"],
    correct: 1,
    explanations: [
      "केवल पढ़ने की अनुमति Read-Only License में होती है।",
      "✅ सही! GNU GPL (General Public License) के तहत Source Code को देखने, बदलने और वितरित करने की स्वतंत्रता है।",
      "Commercial उपयोग Proprietary Software में होता है।",
      "बदलाव न करने की शर्त Proprietary में होती है।"
    ]
  },
  {
    q: "Microsoft Office किस श्रेणी का सॉफ्टवेयर है?",
    options: ["System Software", "Embedded Software", "Application Software", "Open Source Software"],
    correct: 2,
    explanations: [
      "System Software OS जैसे Windows/Linux होते हैं।",
      "Embedded Software hardware devices में होता है।",
      "✅ सही! Microsoft Office (Word, Excel, PowerPoint) Application Software है जो उपयोगकर्ता के कार्यों के लिए बनाया गया है।",
      "Microsoft Office Open Source नहीं है, यह Proprietary है।"
    ]
  },
  {
    q: "कार की Engine Control Unit (ECU) में कौन सा सॉफ्टवेयर होता है?",
    options: ["Application Software", "System Software", "Embedded Software", "Open Source Software"],
    correct: 2,
    explanations: [
      "Application Software उपयोगकर्ता के कार्यों के लिए होता है।",
      "System Software OS जैसे होते हैं।",
      "✅ सही! ECU में Embedded Software होता है जो Real-time में इंजन को control करता है।",
      "ECU का software proprietary embedded होता है।"
    ]
  },
  {
    q: "LibreOffice किस प्रकार का सॉफ्टवेयर है?",
    options: ["Proprietary Application Software", "Open Source Application Software", "System Software", "Embedded Software"],
    correct: 1,
    explanations: [
      "LibreOffice Proprietary नहीं है — यह मुफ्त उपलब्ध है।",
      "✅ सही! LibreOffice एक Open Source Application Software है जो Microsoft Office का विकल्प है।",
      "System Software OS आदि होते हैं।",
      "Embedded Software hardware में built-in होता है।"
    ]
  },
  {
    q: "Device Driver किसके बीच Communication Bridge का काम करता है?",
    options: ["CPU और RAM के बीच", "Hardware और Operating System के बीच", "Internet और Browser के बीच", "User और Application के बीच"],
    correct: 1,
    explanations: [
      "CPU और RAM सीधे Bus के जरिए communicate करते हैं।",

// QUIZ STATE
let questions = [];
let currentIndex = 0;
let score = 0;
let wrongAnswers = 0;
let answered = false;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions() {
  questions = shuffle(allQuestions).map(q => {
    const indices = [0, 1, 2, 3];
    const shuffledIndices = shuffle(indices);
    const newOptions = shuffledIndices.map(i => q.options[i]);
    const newExplanations = shuffledIndices.map(i => q.explanations[i]);
    const newCorrect = shuffledIndices.indexOf(q.correct);
    return {
      q: q.q,
      options: newOptions,
      correct: newCorrect,
      explanations: newExplanations
    };
  });
}

function loadQuestion() {
  answered = false;
  const q = questions[currentIndex];

  document.getElementById('qNum').textContent = `प्रश्न ${currentIndex + 1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounter').textContent = `${currentIndex + 1} / 100`;
  document.getElementById('progressBar').style.width = `${(currentIndex / 100) * 100}%`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-badge">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('explanationBox').classList.remove('show');
  document.getElementById('allExplanations').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(selectedIndex) {
  if (answered) return;
  answered = true;

  const q = questions[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');

  buttons.forEach(btn => btn.disabled = true);

  if (selectedIndex === q.correct) {
    buttons[selectedIndex].classList.add('correct');
    score++;
    document.getElementById('correctCount').textContent = score;
  } else {
    buttons[selectedIndex].classList.add('wrong');
    buttons[q.correct].classList.add('correct');
    wrongAnswers++;
    document.getElementById('wrongCount').textContent = wrongAnswers;
  }

  const total = currentIndex + 1;
  document.getElementById('scorePercent').textContent = Math.round((score / total) * 100) + '%';

  // Show explanation
  const expBox = document.getElementById('explanationBox');
  document.getElementById('correctExp').textContent = q.explanations[q.correct];

  const allExp = document.getElementById('allExplanations');
  const labels = ['A', 'B', 'C', 'D'];
  allExp.innerHTML = '<div style="font-size:0.78rem;color:#f7971e;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">सभी विकल्पों की व्याख्या:</div>';
  q.explanations.forEach((exp, i) => {
    const div = document.createElement('div');
    div.className = 'exp-option-row';
    div.innerHTML = `<strong>${labels[i]})</strong> ${q.options[i]}: ${exp}`;
    allExp.appendChild(div);
  });

  expBox.classList.add('show');
  allExp.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');

  if (currentIndex === 99) {
    document.getElementById('nextBtn').textContent = 'परिणाम देखें 🏆';
  } else {
    document.getElementById('nextBtn').textContent = 'अगला सवाल →';
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= 100) {
    showResult();
    return;
  }
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  const pct = Math.round((score / 100) * 100);
  document.getElementById('finalScore').textContent = `${score} / 100`;
  document.getElementById('finalPercent').textContent = `सफलता प्रतिशत: ${pct}%`;
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = wrongAnswers;

  let emoji, grade, color;
  if (pct >= 90) { emoji = '🏆'; grade = 'Outstanding! श्रेष्ठ प्रदर्शन'; color = '#ffd200'; }
  else if (pct >= 75) { emoji = '🌟'; grade = 'Excellent! उत्कृष्ट'; color = '#00c864'; }
  else if (pct >= 60) { emoji = '👏'; grade = 'Good! अच्छा प्रदर्शन'; color = '#4fc3f7'; }
  else if (pct >= 40) { emoji = '📚'; grade = 'Average — और पढ़ें'; color = '#f7971e'; }
  else { emoji = '💪'; grade = 'Keep Trying! हार मत मानो'; color = '#ff6b6b'; }

  document.getElementById('resultEmoji').textContent = emoji;
  const badge = document.getElementById('gradeBadge');
  badge.textContent = grade;
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.border = `1px solid ${color}55`;
}

function restartQuiz() {
  score = 0;
  wrongAnswers = 0;
  currentIndex = 0;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('scorePercent').textContent = '0%';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('statsBar').style.display = 'flex';
  prepareQuestions();
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// START
prepareQuestions();
loadQuestion();
</script>
